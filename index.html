<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>SCISSOR CHASE - MEGA GIANT RUNNER</title>
<style>
  * {
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(180deg, #0a2f3a 0%, #1c5a6a 100%);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: pan-y;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* UI Elements */
  #ui {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 10;
    pointer-events: none;
    font-family: monospace;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
  }

  #score, #distance {
    background: rgba(0,0,0,0.8);
    padding: 10px 22px;
    border-radius: 40px;
    backdrop-filter: blur(8px);
    font-size: 1.4rem;
    font-weight: bold;
  }
  
  #score { color: #ffd966; border: 2px solid gold; }
  #distance { color: #88ffaa; border: 2px solid #88ffaa; }

  /* START BUTTON - "suru garne ta" */
  #startScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a472a, #0a2f1a);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    backdrop-filter: blur(4px);
  }

  #startBtn {
    background: linear-gradient(135deg, #ff8800, #cc5500);
    border: none;
    padding: 28px 56px;
    font-size: 3rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: white;
    text-shadow: 4px 4px 0 #662200;
    border-radius: 100px;
    cursor: pointer;
    box-shadow: 0 15px 30px rgba(0,0,0,0.5), 0 0 0 5px #ffcc66;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    letter-spacing: 6px;
  }
  
  #startBtn:active {
    transform: scale(0.96);
    box-shadow: 0 8px 20px rgba(0,0,0,0.5), 0 0 0 5px #ffaa44;
  }
  
  .start-title {
    font-size: 2.5rem;
    color: #ffdd99;
    margin-bottom: 40px;
    text-shadow: 4px 4px 0 #664422;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 80px;
    backdrop-filter: blur(8px);
    letter-spacing: 2px;
  }
  
  .start-sub {
    margin-top: 50px;
    color: #ffcc88;
    font-size: 1.2rem;
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 12px 24px;
    border-radius: 50px;
  }

  #gameStatus {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    background: rgba(0,0,0,0.95);
    padding: 30px 50px;
    border-radius: 30px;
    border: 3px solid #ff6600;
    backdrop-filter: blur(12px);
  }

  #gameStatus h1 {
    color: #ffaa44;
    font-size: 2.5rem;
    margin-bottom: 20px;
  }

  #gameStatus p {
    color: white;
    font-size: 1.3rem;
    margin: 10px 0;
  }

  #gameStatus button {
    margin-top: 25px;
    padding: 15px 40px;
    font-size: 1.3rem;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 60px;
    cursor: pointer;
    font-family: monospace;
    pointer-events: auto;
    transition: transform 0.1s;
  }
  
  #gameStatus button:active { transform: scale(0.95); }

  .instruction {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    padding: 10px 20px;
    border-radius: 50px;
    color: #ffdd99;
    font-size: 1rem;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
    font-weight: bold;
  }

  @media (max-width: 600px) {
    #score, #distance { font-size: 1rem; padding: 6px 14px; }
    #gameStatus h1 { font-size: 1.6rem; }
    .instruction { font-size: 0.7rem; bottom: 12px; white-space: nowrap; }
    #startBtn { padding: 18px 36px; font-size: 2rem; }
    .start-title { font-size: 1.5rem; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="score">🏆 SCORE: 0</div>
    <div id="distance">🏃 DISTANCE: 0m</div>
  </div>
  
  <!-- START BUTTON SCREEN - "suru garne ta" -->
  <div id="startScreen">
    <div class="start-title">✂️ SCISSOR CHASE ✂️</div>
    <button id="startBtn">🏃 SURU GARNE TA 🏃</button>
    <div class="start-sub">👇 TAP / CLICK / SPACE to JUMP after start 👆<br>⚡ GS is chasing with GIANT SCISSORS! ⚡</div>
  </div>
  
  <div id="gameStatus" class="hidden">
    <h1>✂️ GAME OVER ✂️</h1>
    <p>You were caught by the Scissor Demon!</p>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">🔁 RUN AGAIN</button>
  </div>
  <div class="instruction">👇 TAP / CLICK / SPACE → MEGA JUMP over obstacles! 👆</div>
</div>

<script>
(function() {
  // ---------- CANVAS ----------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let width = window.innerWidth;
  let height = window.innerHeight;
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  // ---------- GAME CONSTANTS - EXTREMELY MASSIVE SIZES ----------
  const GROUND_Y_OFFSET = 120;
  let groundY = height - GROUND_Y_OFFSET;
  
  // MEGA GIANT SIZE
  const PLAYER_WIDTH = 150;
  const PLAYER_HEIGHT = 150;
  const PLAYER_X = 160;
  
  const ENEMY_WIDTH = 160;
  const ENEMY_HEIGHT = 160;
  
  // Physics - EXTREME JUMP
  let playerY = groundY - PLAYER_HEIGHT;
  let playerVelocityY = 0;
  let isJumping = false;
  const GRAVITY = 0.85;
  const JUMP_POWER = -17.5;
  
  // Game state
  let gameRunning = false;
  let score = 0;
  let distance = 0;
  let speed = 7.2;
  
  // Obstacles
  let obstacles = [];
  const OBSTACLE_WIDTH = 85;
  const OBSTACLE_HEIGHT = 85;
  let spawnCounter = 0;
  let dynamicSpawnRate = 55;
  
  // Enemy (GS)
  let enemyX = -320;
  let enemyY = groundY - ENEMY_HEIGHT + 18;
  let chaseProgress = 0;
  
  // Background scroll
  let bgOffset = 0;
  
  // Image assets
  const playerImg = new Image();
  const gsImg = new Image();
  let imagesLoaded = 0;
  let imagesReady = false;
  
  playerImg.src = "player.png";
  gsImg.src = "gs.png";
  
  playerImg.onload = () => { imagesLoaded++; if (imagesLoaded === 2) imagesReady = true; };
  gsImg.onload = () => { imagesLoaded++; if (imagesLoaded === 2) imagesReady = true; };
  playerImg.onerror = () => { imagesLoaded++; if(imagesLoaded===2) imagesReady=true; };
  gsImg.onerror = () => { imagesLoaded++; if(imagesLoaded===2) imagesReady=true; };
  
  // ---------- AUDIO - GUARANTEED WORKING ----------
  let bgMusic = null;
  let audioCtx = null;
  let musicStarted = false;
  
  function createAndPlayMusic() {
    try {
      if (bgMusic) {
        bgMusic.pause();
        bgMusic = null;
      }
      bgMusic = new Audio();
      bgMusic.src = "bg.mp3";
      bgMusic.loop = true;
      bgMusic.volume = 0.5;
      bgMusic.load();
      
      // DIRECT PLAY with user gesture (click on start button)
      const playPromise = bgMusic.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          musicStarted = true;
          console.log("✅ MUSIC PLAYING!");
        }).catch((error) => {
          console.log("First play failed:", error);
          // Fallback: create a silent context to unlock audio
          const unlockAudio = () => {
            if (!musicStarted && gameRunning) {
              bgMusic.play().then(() => {
                musicStarted = true;
                console.log("✅ Music started on unlock");
              }).catch(() => {});
            }
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchstart', unlockAudio);
          };
          document.addEventListener('click', unlockAudio, { once: true });
          document.addEventListener('touchstart', unlockAudio, { once: true });
        });
      }
    } catch(e) {
      console.log("Audio error:", e);
    }
  }
  
  function stopMusic() {
    if (bgMusic) {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }
    musicStarted = false;
  }
  
  // Jump sound
  function playJumpSound() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 950;
      gain.gain.value = 0.18;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
      osc.stop(audioCtx.currentTime + 0.28);
    } catch(e) {}
  }
  
  function playGameOverSound() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 340;
      gain.gain.value = 0.22;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.9);
      osc.stop(audioCtx.currentTime + 0.85);
      
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = 200;
      gain2.gain.value = 0.16;
      osc2.start(audioCtx.currentTime + 0.25);
      gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.1);
      osc2.stop(audioCtx.currentTime + 1.0);
    } catch(e) {}
  }
  
  // ---------- FIXED COLLISION DETECTION ----------
  function checkCollisionWithObstacles() {
    const playerRect = {
      x: PLAYER_X,
      y: playerY,
      w: PLAYER_WIDTH,
      h: PLAYER_HEIGHT
    };
    
    for (let obs of obstacles) {
      const obsRect = {
        x: obs.x,
        y: obs.y,
        w: OBSTACLE_WIDTH,
        h: OBSTACLE_HEIGHT
      };
      
      // Proper rectangle collision detection
      if (playerRect.x < obsRect.x + obsRect.w &&
          playerRect.x + playerRect.w > obsRect.x &&
          playerRect.y < obsRect.y + obsRect.h &&
          playerRect.y + playerRect.h > obsRect.y) {
        return true; // Collision detected
      }
    }
    return false;
  }
  
  function checkCollisionWithEnemy() {
    const playerRect = {
      x: PLAYER_X,
      y: playerY,
      w: PLAYER_WIDTH,
      h: PLAYER_HEIGHT
    };
    
    const enemyRect = {
      x: enemyX,
      y: enemyY,
      w: ENEMY_WIDTH,
      h: ENEMY_HEIGHT
    };
    
    // Proper rectangle collision detection
    if (playerRect.x < enemyRect.x + enemyRect.w &&
        playerRect.x + playerRect.w > enemyRect.x &&
        playerRect.y < enemyRect.y + enemyRect.h &&
        playerRect.y + playerRect.h > enemyRect.y) {
      return true;
    }
    return false;
  }
  
  // ---------- GAME MECHANICS ----------
  function jump() {
    if (!gameRunning) return;
    // Jump only when on ground
    if (playerY >= groundY - PLAYER_HEIGHT - 5 && !isJumping) {
      playerVelocityY = JUMP_POWER;
      isJumping = true;
      playJumpSound();
    }
  }
  
  function updatePhysics() {
    if (!gameRunning) return;
    playerVelocityY += GRAVITY;
    playerY += playerVelocityY;
    
    // Ground collision
    if (playerY >= groundY - PLAYER_HEIGHT) {
      playerY = groundY - PLAYER_HEIGHT;
      playerVelocityY = 0;
      isJumping = false;
    }
    
    // Ceiling collision
    if (playerY < 0) {
      playerY = 0;
      if (playerVelocityY < 0) playerVelocityY = 0;
    }
  }
  
  function spawnObstacle() {
    if (!gameRunning) return;
    if (obstacles.length > 0) {
      const last = obstacles[obstacles.length - 1];
      if (last.x > width - 350) return;
    }
    obstacles.push({
      x: width,
      y: groundY - OBSTACLE_HEIGHT,
      width: OBSTACLE_WIDTH,
      height: OBSTACLE_HEIGHT,
      passed: false
    });
  }
  
  function updateObstacles() {
    if (!gameRunning) return;
    
    for (let i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= speed;
    }
    
    obstacles = obstacles.filter(obs => obs.x + OBSTACLE_WIDTH > 0);
    
    for (let obs of obstacles) {
      if (!obs.passed && obs.x + OBSTACLE_WIDTH < PLAYER_X) {
        obs.passed = true;
        score += 10;
        updateUI();
      }
    }
  }
  
  function updateEnemy() {
    if (!gameRunning) return;
    
    // Enemy chase logic - gets closer over time
    const targetX = PLAYER_X - 25;
    if (enemyX < targetX) {
      chaseProgress += 0.0032 + (score / 3800);
      if (chaseProgress > 1) chaseProgress = 1;
      enemyX = -320 + (targetX + 100) * chaseProgress;
    }
    
    // Update enemy Y position to follow ground
    enemyY = groundY - ENEMY_HEIGHT + 18;
  }
  
  function checkGameCollisions() {
    if (!gameRunning) return false;
    
    // Check obstacle collision
    if (checkCollisionWithObstacles()) {
      gameOver();
      return true;
    }
    
    // Check enemy collision
    if (checkCollisionWithEnemy()) {
      gameOver();
      return true;
    }
    
    return false;
  }
  
  function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    
    stopMusic();
    playGameOverSound();
    
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('gameStatus').classList.remove('hidden');
  }
  
  function updateUI() {
    document.getElementById('score').textContent = `🏆 SCORE: ${Math.floor(score)}`;
    document.getElementById('distance').textContent = `🏃 DISTANCE: ${Math.floor(distance)}m`;
  }
  
  function updateDifficulty() {
    if (!gameRunning) return;
    speed = 7.2 + Math.floor(score / 400);
    if (speed > 16) speed = 16;
    
    dynamicSpawnRate = Math.max(32, 58 - Math.floor(speed / 1.3));
    
    distance += 0.35;
    updateUI();
  }
  
  // ---------- DRAWING FUNCTIONS ----------
  function drawGround() {
    ctx.fillStyle = '#6B3E1A';
    ctx.fillRect(0, groundY - 12, width, 12);
    ctx.fillStyle = '#8B5A2B';
    ctx.fillRect(0, groundY - 22, width, 12);
    ctx.fillStyle = '#5A9E4E';
    ctx.fillRect(0, groundY - 38, width, 16);
    for(let i = 0; i < width; i += 55) {
      ctx.fillStyle = '#7CB518';
      ctx.beginPath();
      ctx.moveTo(i + (bgOffset % 55), groundY - 46);
      ctx.lineTo(i + 20 + (bgOffset % 55), groundY - 68);
      ctx.lineTo(i - 20 + (bgOffset % 55), groundY - 68);
      ctx.fill();
    }
  }
  
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, groundY - 70);
    grad.addColorStop(0, '#2C82C9');
    grad.addColorStop(1, '#6FB3E0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, groundY - 60);
    
    ctx.fillStyle = '#FFFFFFCC';
    for(let i = 0; i < 3; i++) {
      let cloudX = (bgOffset * 0.4 + i * 400) % (width + 350) - 180;
      ctx.beginPath();
      ctx.ellipse(cloudX, 70 + i*60, 85, 55, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX + 80, 60 + i*52, 78, 52, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX - 70, 63 + i*56, 78, 52, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawObstacles() {
    for (let obs of obstacles) {
      ctx.fillStyle = '#8B5A2B';
      ctx.shadowBlur = 5;
      ctx.fillRect(obs.x, obs.y, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
      ctx.fillStyle = '#C97E3A';
      ctx.fillRect(obs.x + 12, obs.y + 18, OBSTACLE_WIDTH - 24, 14);
      ctx.fillStyle = '#5A3E1A';
      for(let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.moveTo(obs.x + 22 + s*26, obs.y - 14);
        ctx.lineTo(obs.x + 34 + s*26, obs.y + 8);
        ctx.lineTo(obs.x + 10 + s*26, obs.y + 8);
        ctx.fill();
      }
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(obs.x + 26, obs.y + 58, 16, 20);
      ctx.fillRect(obs.x + 54, obs.y + 58, 16, 20);
    }
    ctx.shadowBlur = 0;
  }
  
  function drawPlayer() {
    const x = PLAYER_X;
    const y = playerY;
    
    if (imagesReady && playerImg.complete && playerImg.naturalWidth > 0) {
      ctx.drawImage(playerImg, x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
    } else {
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
      ctx.fillStyle = '#FFDD99';
      ctx.fillRect(x + 30, y + 30, 32, 32);
      ctx.fillRect(x + 88, y + 30, 32, 32);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 40, y + 42, 14, 14);
      ctx.fillRect(x + 96, y + 42, 14, 14);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + 28, y + 100, 42, 22);
      ctx.fillRect(x + 80, y + 100, 42, 22);
      ctx.fillStyle = '#E52525';
      ctx.fillRect(x + 20, y - 20, PLAYER_WIDTH - 40, 30);
    }
    
    if (isJumping && playerVelocityY < -8) {
      ctx.fillStyle = '#FFFFFFAA';
      ctx.beginPath();
      ctx.ellipse(x + PLAYER_WIDTH/2, y + PLAYER_HEIGHT - 20, 35, 16, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawEnemy() {
    const x = enemyX;
    const y = enemyY;
    if (x > width + 180) return;
    
    if (imagesReady && gsImg.complete && gsImg.naturalWidth > 0) {
      ctx.drawImage(gsImg, x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
    } else {
      ctx.fillStyle = '#3A2A2A';
      ctx.fillRect(x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(x + 35, y + 38, 32, 32);
      ctx.fillRect(x + 93, y + 38, 32, 32);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 44, y + 50, 14, 14);
      ctx.fillRect(x + 102, y + 50, 14, 14);
    }
    
    // ONE GIANT SCISSOR
    ctx.font = `bold 92px "Segoe UI Emoji", "Apple Color Emoji"`;
    ctx.shadowBlur = 8;
    ctx.fillStyle = '#F0F0F0';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 58, y + ENEMY_HEIGHT - 28);
    ctx.fillStyle = '#FFDD99';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 61, y + ENEMY_HEIGHT - 31);
    ctx.font = `55px monospace`;
    ctx.fillStyle = '#CCCCAA';
    ctx.fillText("⚔️", x + 24, y + 112);
    ctx.shadowBlur = 0;
    
    const dangerPercent = Math.min(100, Math.floor((enemyX + 320) / (PLAYER_X + 140) * 100));
    if (dangerPercent > 55 && gameRunning) {
      ctx.fillStyle = `rgba(255, 40, 40, ${0.5 + (dangerPercent - 55) / 90})`;
      ctx.fillRect(x - 20, y - 20, ENEMY_WIDTH + 40, 16);
    }
  }
  
  function drawUItext() {
    ctx.font = 'bold 26px "Courier New", monospace';
    ctx.fillStyle = '#FFFFAA';
    ctx.shadowBlur = 2;
    ctx.fillText(`⚡ SPEED: ${Math.floor(speed)}`, width - 170, 60);
    if (gameRunning) {
      const danger = Math.min(99, Math.floor((enemyX + 320) / (PLAYER_X + 150) * 100));
      ctx.fillStyle = danger > 70 ? '#FF6666' : '#FFAA66';
      ctx.fillText(`✂️ DANGER: ${danger}%`, width - 178, 110);
    }
    ctx.shadowBlur = 0;
  }
  
  function draw() {
    ctx.clearRect(0, 0, width, height);
    drawSky();
    drawGround();
    drawObstacles();
    drawPlayer();
    drawEnemy();
    drawUItext();
    
    if (gameRunning && !isJumping && playerY >= groundY - PLAYER_HEIGHT - 5) {
      ctx.font = 'bold 24px monospace';
      ctx.fillStyle = '#FFFFFFEE';
      ctx.shadowBlur = 3;
      ctx.fillText("⚡ MEGA JUMP ⚡", PLAYER_X + 45, playerY - 28);
    }
  }
  
  // ---------- GAME LOOP ----------
  function updateGame() {
