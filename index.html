<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Scissor Chase - Mario Style Runner</title>
<style>
  * {
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(180deg, #0a2f3a 0%, #1c5a6a 100%);
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: pan-y;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
  }

  /* UI Elements */
  #ui {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 10;
    pointer-events: none;
    font-family: monospace;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
  }

  #score, #distance {
    background: rgba(0,0,0,0.7);
    padding: 8px 18px;
    border-radius: 30px;
    backdrop-filter: blur(4px);
    font-size: 1.3rem;
  }
  
  #score { color: #ffd966; border: 1px solid gold; }
  #distance { color: #88ffaa; border: 1px solid #88ffaa; }

  #gameStatus {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    background: rgba(0,0,0,0.9);
    padding: 20px 40px;
    border-radius: 20px;
    border: 2px solid #ff6600;
    backdrop-filter: blur(8px);
  }

  #gameStatus h1 {
    color: #ffaa44;
    font-size: 2rem;
    margin-bottom: 15px;
  }

  #gameStatus p {
    color: white;
    font-size: 1.2rem;
    margin: 8px 0;
  }

  #gameStatus button {
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-family: monospace;
    pointer-events: auto;
    transition: transform 0.1s;
  }
  
  #gameStatus button:active { transform: scale(0.95); }

  .instruction {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 8px 16px;
    border-radius: 40px;
    color: #ddd;
    font-size: 0.9rem;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    #score, #distance { font-size: 1rem; padding: 5px 12px; }
    #gameStatus h1 { font-size: 1.4rem; }
    .instruction { font-size: 0.7rem; bottom: 10px; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="score">🏆 SCORE: 0</div>
    <div id="distance">🏃 DISTANCE: 0m</div>
  </div>
  <div id="gameStatus" class="hidden">
    <h1>✂️ GAME OVER ✂️</h1>
    <p>You were caught by the Scissor Demon!</p>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">🔁 RUN AGAIN</button>
  </div>
  <div class="instruction">👇 TAP / CLICK / SPACE → JUMP over obstacles! 👆</div>
</div>

<script>
(function() {
  // ---------- CANVAS ----------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let width = window.innerWidth;
  let height = window.innerHeight;
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  // ---------- GAME CONSTANTS ----------
  const GROUND_Y_OFFSET = 85;
  let groundY = height - GROUND_Y_OFFSET;
  
  // Player settings - LARGER JUMP DISTANCE (increased jump power)
  const PLAYER_WIDTH = 60;
  const PLAYER_HEIGHT = 60;
  const PLAYER_X = 130; // fixed horizontal position
  
  // Physics - INCREASED JUMP DISTANCE
  let playerY = groundY - PLAYER_HEIGHT;
  let playerVelocityY = 0;
  let isJumping = false;
  const GRAVITY = 0.75;
  const JUMP_POWER = -13.5;  // MUCH HIGHER JUMP (was -12, now -13.5 = higher arc)
  
  // Game state
  let gameRunning = true;
  let score = 0;
  let distance = 0;
  let speed = 6.5;
  
  // Obstacles
  let obstacles = [];
  const OBSTACLE_WIDTH = 48;
  const OBSTACLE_HEIGHT = 48;
  let spawnCounter = 0;
  let dynamicSpawnRate = 65;
  
  // Enemy (GS) - chasing from behind
  let enemyX = -180;
  let enemyY = groundY - 55;
  const ENEMY_WIDTH = 65;
  const ENEMY_HEIGHT = 65;
  let chaseProgress = 0;
  
  // Background scroll
  let bgOffset = 0;
  
  // Image assets - player.png and gs.png with scissor overlay
  const playerImg = new Image();
  const gsImg = new Image();
  let imagesLoaded = 0;
  
  playerImg.src = "player.png";
  gsImg.src = "gs.png";
  
  let imagesReady = false;
  playerImg.onload = () => { imagesLoaded++; if (imagesLoaded === 2) imagesReady = true; };
  gsImg.onload = () => { imagesLoaded++; if (imagesLoaded === 2) imagesReady = true; };
  
  // ---------- AUDIO WITH FORCE PLAY (bg.mp3) ----------
  let bgMusic = null;
  let audioUnlocked = false;
  
  function initAudio() {
    bgMusic = new Audio();
    bgMusic.src = "bg.mp3";
    bgMusic.loop = true;
    bgMusic.volume = 0.45;
    bgMusic.preload = "auto";
    
    // Force load and attempt play on any user interaction
    const tryPlayMusic = () => {
      if (bgMusic && !audioUnlocked) {
        bgMusic.play().then(() => {
          audioUnlocked = true;
          console.log("Background music playing!");
        }).catch(e => {
          console.log("Audio play blocked, waiting for next interaction");
        });
      }
    };
    
    // Multiple event listeners to ensure music plays
    document.body.addEventListener('click', tryPlayMusic, { once: false });
    document.body.addEventListener('touchstart', tryPlayMusic, { once: false });
    canvas.addEventListener('click', tryPlayMusic);
    canvas.addEventListener('touchstart', tryPlayMusic);
    
    // Also try to play immediately on game start if possible
    setTimeout(() => {
      if (!audioUnlocked) {
        bgMusic.play().catch(() => {});
      }
    }, 100);
  }
  
  // Jump sound effect (Web Audio beep)
  let audioCtx = null;
  function playJumpSound() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 900;
      gain.gain.value = 0.15;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
      osc.stop(audioCtx.currentTime + 0.2);
    } catch(e) { console.log("jump sound error"); }
  }
  
  function playGameOverSound() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 300;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
      osc.stop(audioCtx.currentTime + 0.7);
      
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = 180;
      gain2.gain.value = 0.15;
      osc2.start(audioCtx.currentTime + 0.2);
      gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
      osc2.stop(audioCtx.currentTime + 0.9);
    } catch(e) {}
  }
  
  // ---------- GAME MECHANICS ----------
  function jump() {
    if (!gameRunning) return;
    // Jump only when on ground
    if (playerY >= groundY - PLAYER_HEIGHT - 2 && !isJumping) {
      playerVelocityY = JUMP_POWER;
      isJumping = true;
      playJumpSound();
    }
  }
  
  function updatePhysics() {
    if (!gameRunning) return;
    playerVelocityY += GRAVITY;
    playerY += playerVelocityY;
    
    // Ground collision
    if (playerY >= groundY - PLAYER_HEIGHT) {
      playerY = groundY - PLAYER_HEIGHT;
      playerVelocityY = 0;
      isJumping = false;
    }
    
    // Ceiling collision
    if (playerY < 0) {
      playerY = 0;
      if (playerVelocityY < 0) playerVelocityY = 0;
    }
  }
  
  function spawnObstacle() {
    if (!gameRunning) return;
    if (obstacles.length > 0) {
      const last = obstacles[obstacles.length - 1];
      if (last.x > width - 220) return;
    }
    obstacles.push({
      x: width,
      y: groundY - OBSTACLE_HEIGHT,
      width: OBSTACLE_WIDTH,
      height: OBSTACLE_HEIGHT,
      passed: false
    });
  }
  
  function updateObstacles() {
    if (!gameRunning) return;
    
    for (let i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= speed;
    }
    
    obstacles = obstacles.filter(obs => obs.x + OBSTACLE_WIDTH > 0);
    
    for (let obs of obstacles) {
      if (!obs.passed && obs.x + OBSTACLE_WIDTH < PLAYER_X) {
        obs.passed = true;
        score += 10;
        updateUI();
      }
    }
  }
  
  function checkCollisions() {
    if (!gameRunning) return false;
    
    const playerRect = {
      x: PLAYER_X,
      y: playerY,
      w: PLAYER_WIDTH,
      h: PLAYER_HEIGHT
    };
    
    // Obstacle collision
    for (let obs of obstacles) {
      if (playerRect.x < obs.x + OBSTACLE_WIDTH &&
          playerRect.x + PLAYER_WIDTH > obs.x &&
          playerRect.y < obs.y + OBSTACLE_HEIGHT &&
          playerRect.y + PLAYER_HEIGHT > obs.y) {
        gameOver();
        return true;
      }
    }
    
    // Enemy chase logic - gets closer over time
    const targetX = PLAYER_X - 20;
    if (enemyX < targetX) {
      chaseProgress += 0.0025 + (score / 4000);
      if (chaseProgress > 1) chaseProgress = 1;
      enemyX = -180 + (targetX + 50) * chaseProgress;
    }
    
    // Enemy collision
    const enemyRect = {
      x: enemyX,
      y: enemyY,
      w: ENEMY_WIDTH,
      h: ENEMY_HEIGHT
    };
    
    if (playerRect.x < enemyRect.x + enemyRect.w &&
        playerRect.x + PLAYER_WIDTH > enemyRect.x &&
        playerRect.y < enemyRect.y + enemyRect.h &&
        playerRect.y + PLAYER_HEIGHT > enemyRect.y) {
      gameOver();
      return true;
    }
    
    return false;
  }
  
  function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    
    if (bgMusic && !bgMusic.paused) {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }
    playGameOverSound();
    
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('gameStatus').classList.remove('hidden');
  }
  
  function updateUI() {
    document.getElementById('score').textContent = `🏆 SCORE: ${Math.floor(score)}`;
    document.getElementById('distance').textContent = `🏃 DISTANCE: ${Math.floor(distance)}m`;
  }
  
  function updateDifficulty() {
    if (!gameRunning) return;
    speed = 6.5 + Math.floor(score / 450);
    if (speed > 14.5) speed = 14.5;
    
    dynamicSpawnRate = Math.max(38, 68 - Math.floor(speed / 1.5));
    
    distance += 0.28;
    updateUI();
  }
  
  // ---------- DRAWING with player.png and gs.png + scissor overlay ----------
  function drawGround() {
    // Ground platform
    ctx.fillStyle = '#6B3E1A';
    ctx.fillRect(0, groundY - 8, width, 8);
    ctx.fillStyle = '#8B5A2B';
    ctx.fillRect(0, groundY - 12, width, 5);
    // Grass
    ctx.fillStyle = '#5A9E4E';
    ctx.fillRect(0, groundY - 18, width, 6);
    for(let i = 0; i < width; i += 35) {
      ctx.fillStyle = '#7CB518';
      ctx.beginPath();
      ctx.moveTo(i + (bgOffset % 35), groundY - 22);
      ctx.lineTo(i + 8 + (bgOffset % 35), groundY - 32);
      ctx.lineTo(i - 8 + (bgOffset % 35), groundY - 32);
      ctx.fill();
    }
  }
  
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, groundY - 50);
    grad.addColorStop(0, '#2C82C9');
    grad.addColorStop(1, '#6FB3E0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, groundY - 40);
    
    // Clouds
    ctx.fillStyle = '#FFFFFFCC';
    for(let i = 0; i < 3; i++) {
      let cloudX = (bgOffset * 0.4 + i * 280) % (width + 200) - 100;
      ctx.beginPath();
      ctx.ellipse(cloudX, 55 + i*35, 48, 32, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX + 42, 45 + i*30, 42, 30, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX - 32, 48 + i*32, 42, 30, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawObstacles() {
    for (let obs of obstacles) {
      // Wooden crate with spikes
      ctx.fillStyle = '#8B5A2B';
      ctx.shadowBlur = 3;
      ctx.fillRect(obs.x, obs.y, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
      ctx.fillStyle = '#C97E3A';
      ctx.fillRect(obs.x + 5, obs.y + 8, OBSTACLE_WIDTH - 10, 8);
      ctx.fillStyle = '#5A3E1A';
      for(let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.moveTo(obs.x + 10 + s*14, obs.y - 6);
        ctx.lineTo(obs.x + 16 + s*14, obs.y + 4);
        ctx.lineTo(obs.x + 4 + s*14, obs.y + 4);
        ctx.fill();
      }
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(obs.x + 12, obs.y + 28, 8, 12);
      ctx.fillRect(obs.x + 28, obs.y + 28, 8, 12);
    }
    ctx.shadowBlur = 0;
  }
  
  function drawPlayer() {
    const x = PLAYER_X;
    const y = playerY;
    
    if (imagesReady && playerImg.complete && playerImg.naturalWidth > 0) {
      ctx.drawImage(playerImg, x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
    } else {
      // Fallback Mario-style
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
      ctx.fillStyle = '#FFCC88';
      ctx.fillRect(x + 8, y + 8, 12, 12);
      ctx.fillRect(x + 40, y + 8, 12, 12);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 12, y + 12, 5, 5);
      ctx.fillRect(x + 44, y + 12, 5, 5);
    }
    
    // Jump dust effect
    if (isJumping && playerVelocityY < -5) {
      ctx.fillStyle = '#DDDDDDAA';
      ctx.beginPath();
      ctx.ellipse(x + 25, y + PLAYER_HEIGHT - 8, 12, 6, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawEnemy() {
    const x = enemyX;
    const y = enemyY;
    if (x > width + 80) return;
    
    if (imagesReady && gsImg.complete && gsImg.naturalWidth > 0) {
      ctx.drawImage(gsImg, x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
    } else {
      // Fallback enemy
      ctx.fillStyle = '#3A2A2A';
      ctx.fillRect(x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
      ctx.fillStyle = '#FF4444';
      ctx.fillRect(x + 12, y + 15, 12, 12);
      ctx.fillRect(x + 40, y + 15, 12, 12);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 16, y + 19, 5, 5);
      ctx.fillRect(x + 44, y + 19, 5, 5);
    }
    
    // SCISSOR overlay on GS - BIG VISIBLE SCISSORS
    ctx.font = `bold ${ENEMY_WIDTH - 12}px "Segoe UI Emoji"`;
    ctx.fillStyle = '#E0E0E0';
    ctx.shadowBlur = 3;
    ctx.fillText("✂️", x + ENEMY_WIDTH - 22, y + ENEMY_HEIGHT - 12);
    ctx.fillStyle = '#FFAA55';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 24, y + ENEMY_HEIGHT - 14);
    ctx.font = `bold ${ENEMY_WIDTH - 20}px monospace`;
    ctx.fillStyle = '#CCCCCC';
    ctx.fillText("✂️", x + 8, y + 48);
    ctx.shadowBlur = 0;
    
    // Chase warning indicator
    const dangerPercent = Math.min(100, Math.floor((enemyX + 180) / (PLAYER_X + 100) * 100));
    if (dangerPercent > 60) {
      ctx.fillStyle = `rgba(255, 50, 50, ${0.3 + (dangerPercent - 60) / 40 * 0.5})`;
      ctx.fillRect(x - 5, y - 5, ENEMY_WIDTH + 10, 5);
    }
  }
  
  function drawUItext() {
    ctx.font = 'bold 16px "Courier New", monospace';
    ctx.fillStyle = '#FFFFAA';
    ctx.shadowBlur = 0;
    ctx.fillText(`⚡ SPEED: ${Math.floor(speed)}`, width - 120, 45);
    const danger = Math.min(99, Math.floor((enemyX + 180) / (PLAYER_X + 100) * 100));
    ctx.fillStyle = danger > 70 ? '#FF6666' : '#FFAA66';
    ctx.fillText(`✂️ DANGER: ${danger}%`, width - 125, 80);
  }
  
  function draw() {
    ctx.clearRect(0, 0, width, height);
    drawSky();
    drawGround();
    drawObstacles();
    drawPlayer();
    drawEnemy();
    drawUItext();
    
    // Show jump indicator
    if (!isJumping && gameRunning) {
      ctx.font = '14px monospace';
      ctx.fillStyle = '#FFFFFFAA';
      ctx.fillText("↑ TAP TO JUMP ↑", PLAYER_X - 15, playerY - 15);
    }
  }
  
  // ---------- GAME LOOP ----------
  function updateGame() {
    if (!gameRunning) return;
    
    updatePhysics();
    updateObstacles();
    updateDifficulty();
    if (checkCollisions()) return;
    
    spawnCounter++;
    if (spawnCounter >= dynamicSpawnRate) {
      spawnObstacle();
      spawnCounter = 0;
    }
    
    bgOffset += speed * 0.45;
    score += 0.25;
    updateUI();
  }
  
  function animate() {
    updateGame();
    draw();
    requestAnimationFrame(animate);
  }
  
  // ---------- RESTART ----------
  function restartGame() {
    gameRunning = true;
    score = 0;
    distance = 0;
    speed = 6.5;
    obstacles = [];
    spawnCounter = 0;
    playerY = groundY - PLAYER_HEIGHT;
    playerVelocityY = 0;
    isJumping = false;
    chaseProgress = 0;
    enemyX = -180;
    dynamicSpawnRate = 65;
    
    document.getElementById('gameStatus').classList.add('hidden');
    updateUI();
    
    // Restart music
    if (bgMusic) {
      bgMusic.currentTime = 0;
      bgMusic.play().catch(() => {});
      audioUnlocked = true;
    }
  }
  
  // ---------- EVENT HANDLERS (Jump) ----------
  function handleJump(e) {
    e.preventDefault();
    jump();
  }
  
  canvas.addEventListener('touchstart', handleJump, { passive: false });
  canvas.addEventListener('mousedown', handleJump);
  
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      jump();
    }
    if (e.code === 'KeyR' && !gameRunning) restartGame();
  });
  
  document.getElementById('restartBtn').addEventListener('click', () => restartGame());
  
  // Update ground on resize
  window.addEventListener('resize', () => {
    groundY = height - GROUND_Y_OFFSET;
    if (gameRunning) {
      playerY = Math.min(playerY, groundY - PLAYER_HEIGHT);
      enemyY = groundY - 55;
    }
  });
  
  // Initialize
  initAudio();
  setTimeout(() => {
    groundY = height - GROUND_Y_OFFSET;
    playerY = groundY - PLAYER_HEIGHT;
    enemyY = groundY - 55;
    animate();
  }, 100);
})();
</script>
</body>
</html>
