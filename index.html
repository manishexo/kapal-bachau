<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Scissor Chase - Runner Game</title>
<style>
  * {
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(180deg, #0a2f3a 0%, #1c5a6a 100%);
    overflow: hidden;
    font-family: 'Courier New', monospace;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  #ui {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 10;
    pointer-events: none;
  }

  #score, #distance {
    background: rgba(0,0,0,0.8);
    padding: 10px 20px;
    border-radius: 30px;
    color: #ffd966;
    font-size: 1.3rem;
    font-weight: bold;
    font-family: monospace;
  }
  
  #distance { color: #88ffaa; }

  #startScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a472a, #0a2f1a);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  #startBtn {
    background: linear-gradient(135deg, #ff8800, #cc5500);
    border: none;
    padding: 20px 40px;
    font-size: 2rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: white;
    border-radius: 60px;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s;
  }
  
  #startBtn:active {
    transform: scale(0.95);
  }
  
  .start-title {
    font-size: 2rem;
    color: #ffdd99;
    margin-bottom: 30px;
    background: rgba(0,0,0,0.5);
    padding: 15px 30px;
    border-radius: 50px;
  }
  
  .start-sub {
    margin-top: 30px;
    color: #ffcc88;
    font-size: 1rem;
    text-align: center;
    background: rgba(0,0,0,0.5);
    padding: 10px 20px;
    border-radius: 40px;
  }

  #gameStatus {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    background: rgba(0,0,0,0.95);
    padding: 30px 50px;
    border-radius: 30px;
    border: 3px solid #ff6600;
  }

  #gameStatus h1 {
    color: #ffaa44;
    font-size: 2rem;
    margin-bottom: 15px;
  }

  #gameStatus p {
    color: white;
    font-size: 1.2rem;
    margin: 10px 0;
  }

  #gameStatus button {
    margin-top: 20px;
    padding: 12px 35px;
    font-size: 1.2rem;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
  }

  .instruction {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 8px 16px;
    border-radius: 40px;
    color: #ddd;
    font-size: 0.9rem;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="score">🏆 SCORE: 0</div>
    <div id="distance">🏃 DISTANCE: 0m</div>
  </div>
  
  <div id="startScreen">
    <div class="start-title">✂️ SCISSOR CHASE ✂️</div>
    <button id="startBtn">🏃 SURU GARNE TA 🏃</button>
    <div class="start-sub">👇 TAP / CLICK / SPACE to JUMP 👆</div>
  </div>
  
  <div id="gameStatus" class="hidden">
    <h1>✂️ GAME OVER ✂️</h1>
    <p>You were caught!</p>
    <p>Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">🔁 PLAY AGAIN</button>
  </div>
  <div class="instruction">👇 TAP / CLICK / SPACE → JUMP over obstacles! 👆</div>
</div>

<script>
(function() {
  // Canvas setup
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let width = window.innerWidth;
  let height = window.innerHeight;
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  // Game constants - BIG SIZES
  const GROUND_Y_OFFSET = 100;
  let groundY = height - GROUND_Y_OFFSET;
  
  // Large player and enemy
  const PLAYER_WIDTH = 130;
  const PLAYER_HEIGHT = 130;
  const PLAYER_X = 150;
  
  const ENEMY_WIDTH = 140;
  const ENEMY_HEIGHT = 140;
  
  // Jump physics - HIGH JUMP
  let playerY = groundY - PLAYER_HEIGHT;
  let playerVelocityY = 0;
  let isJumping = false;
  const GRAVITY = 0.8;
  const JUMP_POWER = -16;
  
  // Game state
  let gameRunning = false;
  let score = 0;
  let distance = 0;
  let speed = 6.5;
  let frameCounter = 0;
  
  // Obstacles
  let obstacles = [];
  const OBSTACLE_WIDTH = 70;
  const OBSTACLE_HEIGHT = 70;
  let spawnDelay = 0;
  
  // Enemy
  let enemyX = -200;
  let enemyY = groundY - ENEMY_HEIGHT + 15;
  let chaseDistance = 0;
  
  // Background
  let bgOffset = 0;
  
  // Images
  const playerImg = new Image();
  const gsImg = new Image();
  let imagesLoaded = 0;
  let imagesReady = false;
  
  playerImg.src = "player.png";
  gsImg.src = "gs.png";
  
  playerImg.onload = () => { imagesLoaded++; if(imagesLoaded === 2) imagesReady = true; };
  gsImg.onload = () => { imagesLoaded++; if(imagesLoaded === 2) imagesReady = true; };
  playerImg.onerror = () => { imagesLoaded++; if(imagesLoaded === 2) imagesReady = true; };
  gsImg.onerror = () => { imagesLoaded++; if(imagesLoaded === 2) imagesReady = true; };
  
  // Audio - SIMPLE AND RELIABLE
  let bgMusic = null;
  let musicPlaying = false;
  
  function startMusic() {
    try {
      if (bgMusic) {
        bgMusic.pause();
        bgMusic = null;
      }
      bgMusic = new Audio("bg.mp3");
      bgMusic.loop = true;
      bgMusic.volume = 0.5;
      
      const playPromise = bgMusic.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          musicPlaying = true;
          console.log("Music playing");
        }).catch((err) => {
          console.log("Auto-play blocked:", err);
          // Try again on user interaction
          const playOnClick = () => {
            if (gameRunning && !musicPlaying) {
              bgMusic.play().then(() => musicPlaying = true).catch(() => {});
            }
            document.removeEventListener('click', playOnClick);
            document.removeEventListener('touchstart', playOnClick);
          };
          document.addEventListener('click', playOnClick);
          document.addEventListener('touchstart', playOnClick);
        });
      }
    } catch(e) {
      console.log("Audio error:", e);
    }
  }
  
  function stopMusic() {
    if (bgMusic) {
      bgMusic.pause();
      bgMusic.currentTime = 0;
      musicPlaying = false;
    }
  }
  
  // Jump sound
  function playJumpSound() {
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 880;
      gain.gain.value = 0.15;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
      osc.stop(audioCtx.currentTime + 0.25);
      audioCtx.resume();
    } catch(e) {}
  }
  
  // Game functions
  function jump() {
    if (!gameRunning) return;
    if (playerY >= groundY - PLAYER_HEIGHT - 5 && !isJumping) {
      playerVelocityY = JUMP_POWER;
      isJumping = true;
      playJumpSound();
    }
  }
  
  function updatePhysics() {
    if (!gameRunning) return;
    playerVelocityY += GRAVITY;
    playerY += playerVelocityY;
    
    if (playerY >= groundY - PLAYER_HEIGHT) {
      playerY = groundY - PLAYER_HEIGHT;
      playerVelocityY = 0;
      isJumping = false;
    }
    
    if (playerY < 0) {
      playerY = 0;
      if (playerVelocityY < 0) playerVelocityY = 0;
    }
  }
  
  function spawnObstacle() {
    if (!gameRunning) return;
    // Don't spawn too many
    if (obstacles.length > 0) {
      const last = obstacles[obstacles.length - 1];
      if (last.x > width - 300) return;
    }
    obstacles.push({
      x: width,
      y: groundY - OBSTACLE_HEIGHT,
      w: OBSTACLE_WIDTH,
      h: OBSTACLE_HEIGHT,
      passed: false
    });
  }
  
  function updateObstacles() {
    if (!gameRunning) return;
    
    // Move obstacles
    for (let i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= speed;
    }
    
    // Remove off-screen
    obstacles = obstacles.filter(obs => obs.x + obs.w > 0);
    
    // Score for passing obstacles
    for (let obs of obstacles) {
      if (!obs.passed && obs.x + obs.w < PLAYER_X) {
        obs.passed = true;
        score += 10;
      }
    }
  }
  
  function updateEnemy() {
    if (!gameRunning) return;
    
    // Enemy gets closer over time
    const targetX = PLAYER_X - 30;
    if (enemyX < targetX) {
      chaseDistance += 0.0025 + (score / 5000);
      if (chaseDistance > 1) chaseDistance = 1;
      enemyX = -200 + (targetX + 80) * chaseDistance;
    }
    
    enemyY = groundY - ENEMY_HEIGHT + 15;
  }
  
  function checkCollisions() {
    if (!gameRunning) return false;
    
    // Player hitbox
    const playerBox = {
      x: PLAYER_X + 15,
      y: playerY + 10,
      w: PLAYER_WIDTH - 30,
      h: PLAYER_HEIGHT - 20
    };
    
    // Check obstacles
    for (let obs of obstacles) {
      if (playerBox.x < obs.x + obs.w &&
          playerBox.x + playerBox.w > obs.x &&
          playerBox.y < obs.y + obs.h &&
          playerBox.y + playerBox.h > obs.y) {
        return true;
      }
    }
    
    // Check enemy
    const enemyBox = {
      x: enemyX + 20,
      y: enemyY + 15,
      w: ENEMY_WIDTH - 40,
      h: ENEMY_HEIGHT - 30
    };
    
    if (playerBox.x < enemyBox.x + enemyBox.w &&
        playerBox.x + playerBox.w > enemyBox.x &&
        playerBox.y < enemyBox.y + enemyBox.h &&
        playerBox.y + playerBox.h > enemyBox.y) {
      return true;
    }
    
    return false;
  }
  
  function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    stopMusic();
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('gameStatus').classList.remove('hidden');
  }
  
  function updateUI() {
    document.getElementById('score').textContent = `🏆 SCORE: ${Math.floor(score)}`;
    document.getElementById('distance').textContent = `🏃 DISTANCE: ${Math.floor(distance)}m`;
  }
  
  function updateDifficulty() {
    if (!gameRunning) return;
    speed = 6.5 + Math.floor(score / 450);
    if (speed > 14) speed = 14;
    distance += 0.3;
    updateUI();
  }
  
  // Drawing functions
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, groundY - 50);
    grad.addColorStop(0, '#2C82C9');
    grad.addColorStop(1, '#6FB3E0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, groundY - 40);
    
    // Clouds
    ctx.fillStyle = '#FFFFFFCC';
    for(let i = 0; i < 3; i++) {
      let cloudX = (bgOffset * 0.3 + i * 350) % (width + 300) - 150;
      ctx.beginPath();
      ctx.ellipse(cloudX, 70, 60, 40, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX + 50, 55, 55, 38, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX - 40, 60, 55, 38, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawGround() {
    // Dirt
    ctx.fillStyle = '#8B5A2B';
    ctx.fillRect(0, groundY - 15, width, 15);
    ctx.fillStyle = '#6B3E1A';
    ctx.fillRect(0, groundY - 8, width, 8);
    // Grass
    ctx.fillStyle = '#5A9E4E';
    ctx.fillRect(0, groundY - 25, width, 10);
    for(let i = 0; i < width; i += 40) {
      ctx.fillStyle = '#7CB518';
      ctx.beginPath();
      ctx.moveTo(i + (bgOffset % 40), groundY - 30);
      ctx.lineTo(i + 12 + (bgOffset % 40), groundY - 45);
      ctx.lineTo(i - 12 + (bgOffset % 40), groundY - 45);
      ctx.fill();
    }
  }
  
  function drawObstacles() {
    for (let obs of obstacles) {
      ctx.fillStyle = '#8B5A2B';
      ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
      ctx.fillStyle = '#C97E3A';
      ctx.fillRect(obs.x + 10, obs.y + 12, obs.w - 20, 12);
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(obs.x + 18, obs.y + 45, 12, 15);
      ctx.fillRect(obs.x + 40, obs.y + 45, 12, 15);
    }
  }
  
  function drawPlayer() {
    const x = PLAYER_X;
    const y = playerY;
    
    if (imagesReady && playerImg.complete && playerImg.naturalWidth > 0) {
      ctx.drawImage(playerImg, x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
    } else {
      // Fallback
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + 25, y + 30, 25, 25);
      ctx.fillRect(x + 80, y + 30, 25, 25);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 32, y + 40, 10, 10);
      ctx.fillRect(x + 87, y + 40, 10, 10);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + 20, y + 85, 35, 20);
      ctx.fillRect(x + 75, y + 85, 35, 20);
    }
    
    // Jump dust
    if (isJumping) {
      ctx.fillStyle = '#DDDDDDAA';
      ctx.beginPath();
      ctx.ellipse(x + 65, y + PLAYER_HEIGHT - 15, 20, 8, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawEnemy() {
    const x = enemyX;
    const y = enemyY;
    if (x > width + 100) return;
    
    if (imagesReady && gsImg.complete && gsImg.naturalWidth > 0) {
      ctx.drawImage(gsImg, x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
    } else {
      ctx.fillStyle = '#3A2A2A';
      ctx.fillRect(x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(x + 30, y + 35, 25, 25);
      ctx.fillRect(x + 85, y + 35, 25, 25);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 38, y + 45, 10, 10);
      ctx.fillRect(x + 93, y + 45, 10, 10);
    }
    
    // ONE GIANT SCISSOR
    ctx.font = 'bold 80px "Segoe UI Emoji"';
    ctx.fillStyle = '#E0E0E0';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 50, y + ENEMY_HEIGHT - 25);
    ctx.fillStyle = '#FFAA55';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 53, y + ENEMY_HEIGHT - 28);
    
    // Danger indicator
    const danger = Math.min(99, Math.floor((enemyX + 200) / (PLAYER_X + 100) * 100));
    if (danger > 60 && gameRunning) {
      ctx.fillStyle = `rgba(255, 0, 0, 0.4)`;
      ctx.fillRect(x - 10, y - 10, ENEMY_WIDTH + 20, 8);
    }
  }
  
  function drawUI() {
    ctx.font = 'bold 20px monospace';
    ctx.fillStyle = '#FFFFAA';
    ctx.fillText(`SPEED: ${Math.floor(speed)}`, width - 130, 50);
    if (gameRunning) {
      const danger = Math.min(99, Math.floor((enemyX + 200) / (PLAYER_X + 100) * 100));
      ctx.fillStyle = danger > 70 ? '#FF6666' : '#FFAA66';
      ctx.fillText(`DANGER: ${danger}%`, width - 135, 85);
    }
  }
  
  function draw() {
    ctx.clearRect(0, 0, width, height);
    drawSky();
    drawGround();
    drawObstacles();
    drawPlayer();
    drawEnemy();
    drawUI();
    
    if (gameRunning && !isJumping && playerY >= groundY - PLAYER_HEIGHT - 5) {
      ctx.font = 'bold 18px monospace';
      ctx.fillStyle = '#FFFFFF';
      ctx.shadowBlur = 2;
      ctx.fillText("↑ JUMP ↑", PLAYER_X + 45, playerY - 15);
      ctx.shadowBlur = 0;
    }
  }
  
  // Game loop
  function update() {
    if (!gameRunning) return;
    
    updatePhysics();
    updateObstacles();
    updateEnemy();
    updateDifficulty();
    
    if (checkCollisions()) {
      gameOver();
      return;
    }
    
    // Spawn obstacles
    spawnDelay++;
    let spawnRate = Math.max(40, 65 - Math.floor(speed));
    if (spawnDelay >= spawnRate) {
      spawnObstacle();
      spawnDelay = 0;
    }
    
    // Update background
    bgOffset += speed * 0.5;
    score += 0.25;
    updateUI();
  }
  
  function animate() {
    update();
    draw();
    requestAnimationFrame(animate);
  }
  
  // Start game
  function startGame() {
    document.getElementById('startScreen').classList.add('hidden');
    
    // Reset all
    gameRunning = true;
    score = 0;
    distance = 0;
    speed = 6.5;
    obstacles = [];
    spawnDelay = 0;
    playerY = groundY - PLAYER_HEIGHT;
    playerVelocityY = 0;
    isJumping = false;
    chaseDistance = 0;
    enemyX = -200;
    frameCounter = 0;
    
    updateUI();
    startMusic();
  }
  
  function restartGame() {
    gameRunning = true;
    score = 0;
    distance = 0;
    speed = 6.5;
    obstacles = [];
    spawnDelay = 0;
    playerY = groundY - PLAYER_HEIGHT;
    playerVelocityY = 0;
    isJumping = false;
    chaseDistance = 0;
    enemyX = -200;
    
    document.getElementById('gameStatus').classList.add('hidden');
    updateUI();
    startMusic();
  }
  
  // Events
  function handleJump(e) {
    e.preventDefault();
    jump();
  }
  
  canvas.addEventListener('touchstart', handleJump, { passive: false });
  canvas.addEventListener('mousedown', handleJump);
  
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      jump();
    }
    if (e.code === 'KeyR' && !gameRunning) {
      restartGame();
    }
  });
  
  document.getElementById('startBtn').addEventListener('click', () => startGame());
  document.getElementById('restartBtn').addEventListener('click', () => restartGame());
  
  window.addEventListener('resize', () => {
    groundY = height - GROUND_Y_OFFSET;
    if (gameRunning) {
      playerY = Math.min(playerY, groundY - PLAYER_HEIGHT);
      enemyY = groundY - ENEMY_HEIGHT + 15;
    }
  });
  
  // Initialize
  setTimeout(() => {
    groundY = height - GROUND_Y_OFFSET;
    playerY = groundY - PLAYER_HEIGHT;
    enemyY = groundY - ENEMY_HEIGHT + 15;
    animate();
  }, 100);
})();
</script>
</body>
</html>
