<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Scissor Chase - Escape the Cutter!</title>
<style>
  * {
    user-select: none;
    touch-action: manipulation;
  }

  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at center, #1a472a 0%, #0a2f1a 100%);
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }

  #gameArea {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: none;
  }

  /* Character base */
  .character {
    position: absolute;
    width: 85px;
    height: 85px;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4));
    transition: transform 0.05s linear;
    z-index: 20;
    pointer-events: none;
  }

  /* Player - brave runner */
  #player {
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="%23FFD966" stroke="%23B45F1B" stroke-width="3"/><circle cx="35" cy="40" r="5" fill="white"/><circle cx="65" cy="40" r="5" fill="white"/><circle cx="35" cy="41" r="2.5" fill="black"/><circle cx="65" cy="41" r="2.5" fill="black"/><path d="M45 65 Q50 75 55 65" stroke="%238B4513" stroke-width="4" fill="none" stroke-linecap="round"/><rect x="44" y="20" width="12" height="18" fill="%23E67E22" rx="3"/><path d="M30 65 L20 75 M70 65 L80 75" stroke="%23553C1F" stroke-width="5" stroke-linecap="round"/></svg>');
    background-size: cover;
  }

  /* GS enemy with SCISSOR (evil barber) */
  #gs {
    background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="44" fill="%23333333" stroke="%23111111" stroke-width="3"/><circle cx="32" cy="42" r="6" fill="%23FFAAAA"/><circle cx="68" cy="42" r="6" fill="%23FFAAAA"/><circle cx="32" cy="43" r="2.5" fill="black"/><circle cx="68" cy="43" r="2.5" fill="black"/><path d="M40 68 Q50 78 60 68" stroke="%23AA2222" stroke-width="5" fill="none" stroke-linecap="round"/><rect x="20" y="20" width="14" height="38" fill="%23996633" transform="rotate(-30 27 35)" rx="3"/><rect x="66" y="20" width="14" height="38" fill="%23996633" transform="rotate(30 73 35)" rx="3"/><polygon points="27,33 20,24 32,28" fill="%23CCCCCC" stroke="black" stroke-width="1.5"/><polygon points="73,33 80,24 68,28" fill="%23CCCCCC" stroke="black" stroke-width="1.5"/><line x1="32" y1="54" x2="44" y2="62" stroke="%23AAAAAA" stroke-width="4" stroke-linecap="round"/><line x1="68" y1="54" x2="56" y2="62" stroke="%23AAAAAA" stroke-width="4" stroke-linecap="round"/></svg>');
    background-size: cover;
    filter: drop-shadow(0 0 5px darkred);
  }

  /* Obstacles: spooky barber poles or dark blocks */
  .obstacle {
    position: absolute;
    width: 95px;
    height: 95px;
    background: repeating-linear-gradient(45deg, #2c2c2c, #2c2c2c 15px, #5a3e1a 15px, #5a3e1a 30px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    border-radius: 20px 8px 20px 8px;
    border: 2px solid #b87c4f;
    transition: all 0.05s;
    z-index: 10;
  }
  /* extra style: some obstacles with scissor marks */
  .obstacle::after {
    content: "✂️";
    font-size: 42px;
    position: absolute;
    bottom: 5px;
    right: 8px;
    opacity: 0.5;
    filter: drop-shadow(0 0 2px black);
  }

  /* Message panel */
  #message {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    color: #ffec80;
    font-family: monospace;
    font-size: 1.5rem;
    font-weight: bold;
    padding: 8px 20px;
    border-radius: 60px;
    text-shadow: 2px 2px 0 #5a2e0e;
    letter-spacing: 1px;
    z-index: 100;
    white-space: nowrap;
    pointer-events: none;
    border: 1px solid gold;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
  }

  /* JOYSTICK CONTAINER - floating for mobile */
  .joystick-container {
    position: fixed;
    bottom: 30px;
    left: 30px;
    width: 140px;
    height: 140px;
    background: rgba(30,30,40,0.65);
    backdrop-filter: blur(12px);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(255,215,0,0.6), 0 8px 25px black;
    z-index: 200;
    touch-action: none;
  }
  .joystick-base {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, rgba(80,80,100,0.9), rgba(20,20,30,0.95));
  }
  .joystick-thumb {
    position: absolute;
    width: 55px;
    height: 55px;
    background: radial-gradient(circle at 35% 35%, #f9e45b, #d68b2c);
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 4px 10px black;
    border: 2px solid #ffdd99;
    transition: transform 0.02s;
    pointer-events: none;
  }
  .joystick-status {
    position: absolute;
    bottom: -35px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 12px;
    font-weight: bold;
    background: #000000aa;
    padding: 2px 8px;
    border-radius: 20px;
    white-space: nowrap;
    pointer-events: none;
  }
  @media (max-width: 700px) {
    .joystick-container { width: 120px; height: 120px; bottom: 20px; left: 20px; }
    .joystick-thumb { width: 48px; height: 48px; }
    .character { width: 80px; height: 80px; }
    .obstacle { width: 85px; height: 85px; }
    #message { font-size: 1rem; white-space: nowrap; top: 10px; }
  }
  @media (max-width: 480px) {
    .joystick-container { width: 100px; height: 100px; }
    .joystick-thumb { width: 42px; height: 42px; }
    .character { width: 70px; height: 70px; }
    .obstacle { width: 75px; height: 75px; }
  }
  .restart-btn {
    position: fixed;
    bottom: 30px;
    right: 20px;
    background: #e25822;
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-weight: bold;
    font-size: 1rem;
    font-family: monospace;
    z-index: 250;
    box-shadow: 0 4px 12px black;
    cursor: pointer;
    transition: 0.1s linear;
    touch-action: manipulation;
  }
  .restart-btn:active {
    transform: scale(0.96);
  }
  /* hide cursor on desktop to feel like chase */
  @media (min-width: 768px) {
    body { cursor: none; }
  }
</style>
</head>
<body>
<div id="gameArea">
  <div id="message">✂️ ESCAPE THE SCISSOR DEMON! ✂️</div>
  <div id="player" class="character"></div>
  <div id="gs" class="character"></div>
  <!-- obstacles will be injected via JS to make 8+ obstacles -->
</div>
<div class="joystick-container" id="joystickZone">
  <div class="joystick-base"></div>
  <div class="joystick-thumb" id="joystickThumb"></div>
  <div class="joystick-status">🕹️ Drag to run</div>
</div>
<button class="restart-btn" id="restartGame">✂️ RESTART ✂️</button>

<script>
  (function(){
    // ------ GLOBALS ------
    const playerDiv = document.getElementById("player");
    const gsDiv = document.getElementById("gs");
    const gameArea = document.getElementById("gameArea");
    const msgDiv = document.getElementById("message");
    const restartBtn = document.getElementById("restartGame");

    // Game state
    let playerPos = { x: 120, y: 200 };
    let gsPos = { x: 700, y: 500 };
    const PLAYER_SIZE = 85;    // width/height (match CSS)
    const GS_SIZE = 85;
    let playerSpeed = 5.2;
    const GS_SPEED = 2.3;
    let animationId = null;
    let gameActive = true;

    // Keyboard handling (optional for desktop)
    const keys = {};

    // ----- OBSTACLES (dynamic list) -----
    let obstaclesArray = []; // store DOM elements

    // ----- JOYSTICK SYSTEM -----
    let joystickActive = false;
    let joystickVector = { x: 0, y: 0 }; // normalized direction * intensity (range -1..1)
    const joystickZone = document.getElementById("joystickZone");
    const joystickThumb = document.getElementById("joystickThumb");
    const stickRadius = 45; // max travel distance (px) relative to container
    let baseRect = null;

    // Helper: update joystick visuals & vector
    function updateJoystick(clientX, clientY) {
      if (!baseRect) return;
      const centerX = baseRect.left + baseRect.width / 2;
      const centerY = baseRect.top + baseRect.height / 2;
      let dx = clientX - centerX;
      let dy = clientY - centerY;
      const distance = Math.hypot(dx, dy);
      let limited = Math.min(distance, stickRadius);
      let angle = Math.atan2(dy, dx);
      let thumbX = Math.cos(angle) * limited;
      let thumbY = Math.sin(angle) * limited;
      joystickThumb.style.transform = `translate(calc(-50% + ${thumbX}px), calc(-50% + ${thumbY}px))`;
      
      // compute vector intensity (0 to 1)
      let intensity = Math.min(1, distance / stickRadius);
      let normX = 0, normY = 0;
      if (distance > 0.01) {
        normX = dx / distance;
        normY = dy / distance;
      }
      joystickVector.x = normX * intensity;
      joystickVector.y = normY * intensity;
    }

    function resetJoystick() {
      joystickThumb.style.transform = "translate(-50%, -50%)";
      joystickVector = { x: 0, y: 0 };
    }

    function onTouchStart(e) {
      if (!gameActive) return;
      e.preventDefault();
      joystickActive = true;
      baseRect = joystickZone.getBoundingClientRect();
      const touch = e.touches[0];
      updateJoystick(touch.clientX, touch.clientY);
    }

    function onTouchMove(e) {
      if (!gameActive || !joystickActive) return;
      e.preventDefault();
      const touch = e.touches[0];
      updateJoystick(touch.clientX, touch.clientY);
    }

    function onTouchEnd(e) {
      e.preventDefault();
      joystickActive = false;
      resetJoystick();
    }

    // Mouse events for desktop test (optional)
    function onMouseDown(e) {
      if (!gameActive) return;
      e.preventDefault();
      joystickActive = true;
      baseRect = joystickZone.getBoundingClientRect();
      updateJoystick(e.clientX, e.clientY);
      window.addEventListener("mousemove", onMouseMove);
      window.addEventListener("mouseup", onMouseUp);
    }
    function onMouseMove(e) {
      if (!gameActive || !joystickActive) return;
      updateJoystick(e.clientX, e.clientY);
    }
    function onMouseUp(e) {
      joystickActive = false;
      resetJoystick();
      window.removeEventListener("mousemove", onMouseMove);
      window.removeEventListener("mouseup", onMouseUp);
    }

    // Attach joystick events
    joystickZone.addEventListener("touchstart", onTouchStart, { passive: false });
    joystickZone.addEventListener("touchmove", onTouchMove, { passive: false });
    joystickZone.addEventListener("touchend", onTouchEnd);
    joystickZone.addEventListener("touchcancel", onTouchEnd);
    joystickZone.addEventListener("mousedown", onMouseDown);
    
    // ----- AUDIO: bg.mp3 that loops when game starts -----
    let bgMusic = null;
    function initAudio() {
      try {
        bgMusic = new Audio("bg.mp3");
        bgMusic.loop = true;
        bgMusic.volume = 0.5;
        // Autoplay policy: user interaction needed on many browsers. We'll attempt to play on first user touch/move but also on restart.
        // but we also play immediately on game load with a silent promise catch.
        let playPromise = bgMusic.play();
        if (playPromise !== undefined) {
          playPromise.catch(e => {
            console.log("Autoplay blocked, waiting for first interaction");
            // On any tap on game area or joystick, we'll play
          });
        }
      } catch(e) { console.warn("audio error", e); }
    }
    
    // attempt to play audio on user first touch anywhere (user gesture)
    function enableAudioOnInteraction() {
      if (bgMusic && bgMusic.paused) {
        bgMusic.play().catch(e=>console.log("audio play failed", e));
      }
    }
    document.body.addEventListener("touchstart", enableAudioOnInteraction, { once: true });
    document.body.addEventListener("click", enableAudioOnInteraction, { once: true });
    
    // ----- OBSTACLE GENERATION: add 8+ obstacles in interesting positions-----
    function createObstacles() {
      // remove existing
      obstaclesArray.forEach(obs => obs.remove());
      obstaclesArray = [];
      const obstaclePositions = [
        { x: 220, y: 120 }, { x: 620, y: 80 }, { x: 420, y: 380 },
        { x: 880, y: 250 }, { x: 1100, y: 500 }, { x: 70, y: 550 },
        { x: 540, y: 650 }, { x: 950, y: 700 }, { x: 1300, y: 380 },
        { x: 280, y: 780 }, { x: 760, y: 460 }, { x: 1150, y: 180 }
      ];
      // ensure within view but dynamic resize on window resize we recalc positions? but fine initial.
      const maxW = window.innerWidth - 100;
      const maxH = window.innerHeight - 100;
      for (let pos of obstaclePositions) {
        let obsX = Math.min(maxW, Math.max(20, pos.x));
        let obsY = Math.min(maxH, Math.max(20, pos.y));
        const obstacleDiv = document.createElement("div");
        obstacleDiv.className = "obstacle";
        obstacleDiv.style.left = obsX + "px";
        obstacleDiv.style.top = obsY + "px";
        gameArea.appendChild(obstacleDiv);
        obstaclesArray.push(obstacleDiv);
      }
      // add 3 more random to have at least 12
      for (let i = 0; i < 3; i++) {
        let randX = 40 + Math.random() * (window.innerWidth - 120);
        let randY = 40 + Math.random() * (window.innerHeight - 120);
        const obstacleDiv = document.createElement("div");
        obstacleDiv.className = "obstacle";
        obstacleDiv.style.left = randX + "px";
        obstacleDiv.style.top = randY + "px";
        gameArea.appendChild(obstacleDiv);
        obstaclesArray.push(obstacleDiv);
      }
    }
    
    // Collision check (rectangle collision with obstacles)
    function checkCollisionWithObstacles(x, y, width, height, excludeEntity = null) {
      for (let obs of obstaclesArray) {
        const oRect = obs.getBoundingClientRect();
        if (x < oRect.right && x + width > oRect.left && y < oRect.bottom && y + height > oRect.top) {
          return true;
        }
      }
      return false;
    }
    
    // also ensure player/gs cannot overlap with each other? Not mandatory but realistic? avoid weird stacking
    function checkCollisionBetweenCharacters(newPlayerX, newPlayerY, newGsX, newGsY) {
      // if player and GS overlap except when caught, but we allow catch detection later. 
      // But to avoid clipping we prevent movement if overlapping? Actually chase is fun but we avoid inside each other.
      if (Math.abs(newPlayerX - newGsX) < (PLAYER_SIZE-5) && Math.abs(newPlayerY - newGsY) < (GS_SIZE-5)) {
        return true;
      }
      return false;
    }
    
    // MOVE PLAYER with joystick OR keyboard
    function movePlayer() {
      if (!gameActive) return;
      let moveX = 0, moveY = 0;
      // Joystick priority (if active vector length > 0.05)
      const joyMagnitude = Math.hypot(joystickVector.x, joystickVector.y);
      if (joyMagnitude > 0.05) {
        moveX = joystickVector.x * playerSpeed;
        moveY = joystickVector.y * playerSpeed;
      } else {
        // keyboard fallback
        if (keys["ArrowUp"]) moveY -= playerSpeed;
        if (keys["ArrowDown"]) moveY += playerSpeed;
        if (keys["ArrowLeft"]) moveX -= playerSpeed;
        if (keys["ArrowRight"]) moveX += playerSpeed;
      }
      if (moveX === 0 && moveY === 0) return;
      
      let newX = playerPos.x + moveX;
      let newY = playerPos.y + moveY;
      // boundary limits
      newX = Math.max(0, Math.min(window.innerWidth - PLAYER_SIZE, newX));
      newY = Math.max(0, Math.min(window.innerHeight - PLAYER_SIZE, newY));
      
      if (!checkCollisionWithObstacles(newX, newY, PLAYER_SIZE, PLAYER_SIZE)) {
        // extra check to avoid overlapping GS (prevents weird phasing)
        let tempGs = gsPos;
        if (!(Math.abs(newX - tempGs.x) < (PLAYER_SIZE-4) && Math.abs(newY - tempGs.y) < (GS_SIZE-4))) {
          playerPos.x = newX;
          playerPos.y = newY;
        }
      }
      playerDiv.style.transform = `translate(${playerPos.x}px, ${playerPos.y}px)`;
    }
    
    // Move GS (scissor enemy) with obstacle avoidance + smooth chase
    function moveGS() {
      if (!gameActive) return;
      const dx = playerPos.x - gsPos.x;
      const dy = playerPos.y - gsPos.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.01) {
        let stepX = (dx / dist) * GS_SPEED;
        let stepY = (dy / dist) * GS_SPEED;
        let newX = gsPos.x + stepX;
        let newY = gsPos.y + stepY;
        newX = Math.max(0, Math.min(window.innerWidth - GS_SIZE, newX));
        newY = Math.max(0, Math.min(window.innerHeight - GS_SIZE, newY));
        // obstacle avoidance: try step then revert if collision
        if (!checkCollisionWithObstacles(newX, newY, GS_SIZE, GS_SIZE)) {
          // also avoid overlapping player ? if caught it will trigger anyway
          if (!(Math.abs(newX - playerPos.x) < (GS_SIZE-8) && Math.abs(newY - playerPos.y) < (PLAYER_SIZE-8))) {
            gsPos.x = newX;
            gsPos.y = newY;
          } else {
            // if it would overlap, still push a little closer but not overlapped fully
            if (dist > 8) {
              gsPos.x = newX * 0.8 + gsPos.x * 0.2;
              gsPos.y = newY * 0.8 + gsPos.y * 0.2;
            }
          }
        } else {
          // try alternative strafe
          let angle = Math.atan2(dy, dx);
          let altAngles = [0.7, -0.7, 1.2, -1.2];
          for (let ang of altAngles) {
            let newAngle = angle + ang;
            let altX = gsPos.x + Math.cos(newAngle) * GS_SPEED;
            let altY = gsPos.y + Math.sin(newAngle) * GS_SPEED;
            altX = Math.max(0, Math.min(window.innerWidth - GS_SIZE, altX));
            altY = Math.max(0, Math.min(window.innerHeight - GS_SIZE, altY));
            if (!checkCollisionWithObstacles(altX, altY, GS_SIZE, GS_SIZE)) {
              gsPos.x = altX;
              gsPos.y = altY;
              break;
            }
          }
        }
      }
      gsDiv.style.transform = `translate(${gsPos.x}px, ${gsPos.y}px)`;
    }
    
    // check caught (scissor snip!)
    function checkCaught() {
      if (!gameActive) return false;
      const dx = playerPos.x - gsPos.x;
      const dy = playerPos.y - gsPos.y;
      const distance = Math.hypot(dx, dy);
      if (distance < 52) {  // bigger radius for dramatic catch
        gameActive = false;
        msgDiv.innerHTML = "✂️ SNIP! You got caught by the scissor demon! ✂️ Press RESTART";
        if (animationId) cancelAnimationFrame(animationId);
        animationId = null;
        if (bgMusic) {
          bgMusic.pause();
        }
        return true;
      }
      return false;
    }
    
    // resize handler to keep obstacles positions valid? not needed, but re-clamp player pos on window resize
    function onWindowResize() {
      playerPos.x = Math.min(window.innerWidth - PLAYER_SIZE, Math.max(0, playerPos.x));
      playerPos.y = Math.min(window.innerHeight - PLAYER_SIZE, Math.max(0, playerPos.y));
      gsPos.x = Math.min(window.innerWidth - GS_SIZE, Math.max(0, gsPos.x));
      gsPos.y = Math.min(window.innerHeight - GS_SIZE, Math.max(0, gsPos.y));
      playerDiv.style.transform = `translate(${playerPos.x}px, ${playerPos.y}px)`;
      gsDiv.style.transform = `translate(${gsPos.x}px, ${gsPos.y}px)`;
      // obstacles might be partially out but fine.
    }
    
    // Game Loop
    function gameLoop() {
      if (!gameActive) return;
      movePlayer();
      moveGS();
      checkCaught();
      if (gameActive) {
        animationId = requestAnimationFrame(gameLoop);
      }
    }
    
    // Restart function fully resets game, reinit audio, obstacles, positions
    function restartGame() {
      if (animationId) cancelAnimationFrame(animationId);
      gameActive = true;
      // reset positions safe
      playerPos = { x: 100, y: 150 };
      gsPos = { x: Math.max(window.innerWidth - 150, 600), y: Math.max(window.innerHeight - 200, 400) };
      if (gsPos.x + GS_SIZE > window.innerWidth) gsPos.x = window.innerWidth - GS_SIZE - 10;
      if (gsPos.y + GS_SIZE > window.innerHeight) gsPos.y = window.innerHeight - GS_SIZE - 10;
      playerDiv.style.transform = `translate(${playerPos.x}px, ${playerPos.y}px)`;
      gsDiv.style.transform = `translate(${gsPos.x}px, ${gsPos.y}px)`;
      msgDiv.innerHTML = "✂️ RUN! Scissor demon is chasing! ✂️";
      // re-create obstacles to have fresh ones
      createObstacles();
      // restart audio
      if (bgMusic) {
        bgMusic.currentTime = 0;
        bgMusic.play().catch(e=>console.log("play on restart", e));
      } else {
        initAudio();
      }
      resetJoystick();
      // reset keys
      for (let k in keys) delete keys[k];
      // restart loop
      animationId = requestAnimationFrame(gameLoop);
    }
    
    // keyboard setup
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp" || e.key === "ArrowDown" || e.key === "ArrowLeft" || e.key === "ArrowRight") {
        e.preventDefault();
        keys[e.key] = true;
      }
    });
    document.addEventListener("keyup", (e) => {
      delete keys[e.key];
    });
    
    // initialize world
    function init() {
      createObstacles();
      playerDiv.style.transform = `translate(${playerPos.x}px, ${playerPos.y}px)`;
      gsDiv.style.transform = `translate(${gsPos.x}px, ${gsPos.y}px)`;
      initAudio();
      window.addEventListener("resize", () => {
        onWindowResize();
        // re-evaluate obstacles? just for safety update positions but not needed
        createObstacles(); // refresh obstacle positions on resize to avoid stuck
        onWindowResize();
      });
      animationId = requestAnimationFrame(gameLoop);
    }
    
    restartBtn.addEventListener("click", () => {
      restartGame();
    });
    
    init();
  })();
</script>
</body>
</html>
