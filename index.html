<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>GS BATA KAPAL BACHAU KTA HO</title>
<style>
  * { margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  body { background: linear-gradient(180deg, #0a2f3a 0%, #1c5a6a 100%); overflow: hidden; font-family: 'Courier New', monospace; }
  #gameContainer { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
  canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: block; }
  #ui { position: absolute; top: 20px; left: 0; right: 0; display: flex; justify-content: space-between; padding: 0 20px; z-index: 10; pointer-events: none; }
  #score, #distance { background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 30px; color: #ffd966; font-size: 1.3rem; font-weight: bold; }
  #distance { color: #88ffaa; }
  #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a472a, #0a2f1a); z-index: 100; display: flex; justify-content: center; align-items: center; flex-direction: column; }
  #startBtn { background: linear-gradient(135deg, #ff8800, #cc5500); border: none; padding: 20px 40px; font-size: 2rem; font-weight: bold; font-family: 'Courier New', monospace; color: white; border-radius: 60px; cursor: pointer; }
  #gameStatus { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 20; background: rgba(0,0,0,0.95); padding: 30px 50px; border-radius: 30px; border: 3px solid #ff6600; }
  #gameStatus h1 { color: #ffaa44; font-size: 2rem; margin-bottom: 15px; }
  #gameStatus p { color: white; font-size: 1.2rem; margin: 10px 0; }
  #gameStatus button { margin-top: 20px; padding: 12px 35px; font-size: 1.2rem; font-weight: bold; background: #ff6600; color: white; border: none; border-radius: 50px; cursor: pointer; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>

  <div id="ui">
    <div id="score">🏆 SCORE: 0</div>
    <div id="distance">🏃 DISTANCE: 0m</div>
  </div>

  <div id="startScreen">
    <button id="startBtn">START</button>
  </div>

  <div id="gameStatus" class="hidden">
    <h1>GAME OVER</h1>
    <p>Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">RESTART</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let playerY = 300;
let velocity = 0;
let gravity = 0.8;
let jumping = false;

let gameRunning = false;
let score = 0;

let obstacles = [];

let bgMusic = null;
let hitSound = null;
let musicPlaying = false;

// ✅ FIXED BG MUSIC
function startMusic() {
  bgMusic = new Audio("bg.mp3");
  bgMusic.loop = true;
  bgMusic.volume = 0.5;

  bgMusic.play().then(() => {
    musicPlaying = true;
  }).catch(() => {
    const retry = () => {
      bgMusic.play();
      document.removeEventListener("click", retry);
    };
    document.addEventListener("click", retry);
  });
}

function stopMusic() {
  if (bgMusic) {
    bgMusic.pause();
    bgMusic.currentTime = 0;
  }
}

// ✅ HIT SOUND
function playHitSound() {
  hitSound = new Audio("hit.mp3");
  hitSound.volume = 0.7;
  hitSound.play();
}

function jump() {
  if (!jumping) {
    velocity = -15;
    jumping = true;
  }
}

function gameOver() {
  gameRunning = false;
  stopMusic();
  playHitSound(); // 🔥 NEW
  document.getElementById("finalScore").innerText = score;
  document.getElementById("gameStatus").classList.remove("hidden");
}

function update() {
  if (!gameRunning) return;

  velocity += gravity;
  playerY += velocity;

  if (playerY > 300) {
    playerY = 300;
    jumping = false;
  }

  for (let obs of obstacles) {
    obs.x -= 5;

    if (obs.x < 100 && obs.x > 50 && playerY > 250) {
      gameOver();
    }
  }

  if (Math.random() < 0.02) {
    obstacles.push({ x: canvas.width, y: 320 });
  }

  score++;
  document.getElementById("score").innerText = "Score: " + score;
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "red";
  ctx.fillRect(100, playerY, 50, 50);

  ctx.fillStyle = "black";
  for (let obs of obstacles) {
    ctx.fillRect(obs.x, obs.y, 40, 40);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("click", jump);

document.getElementById("startBtn").onclick = () => {
  document.getElementById("startScreen").classList.add("hidden");
  gameRunning = true;
  startMusic();
};

document.getElementById("restartBtn").onclick = () => {
  location.reload();
};

loop();
</script>
</body>
</html>
