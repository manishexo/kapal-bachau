<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Scissor Chase - Giant Runner</title>
<style>
  * {
    margin: 0;
    padding: 0;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(180deg, #0a2f3a 0%, #1c5a6a 100%);
    overflow: hidden;
    font-family: 'Courier New', 'Press Start 2P', monospace;
    touch-action: pan-y;
  }

  #gameContainer {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* UI Elements */
  #ui {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 10;
    pointer-events: none;
    font-family: monospace;
    font-weight: bold;
    text-shadow: 2px 2px 0 #000;
  }

  #score, #distance {
    background: rgba(0,0,0,0.7);
    padding: 8px 18px;
    border-radius: 30px;
    backdrop-filter: blur(4px);
    font-size: 1.3rem;
  }
  
  #score { color: #ffd966; border: 1px solid gold; }
  #distance { color: #88ffaa; border: 1px solid #88ffaa; }

  /* START BUTTON - "suru garne ta" */
  #startScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, #1a472a, #0a2f1a);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    backdrop-filter: blur(4px);
  }

  #startBtn {
    background: linear-gradient(135deg, #ff8800, #cc5500);
    border: none;
    padding: 24px 48px;
    font-size: 2.5rem;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: white;
    text-shadow: 3px 3px 0 #662200;
    border-radius: 80px;
    cursor: pointer;
    box-shadow: 0 12px 25px rgba(0,0,0,0.4), 0 0 0 4px #ffcc66;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    letter-spacing: 4px;
  }
  
  #startBtn:active {
    transform: scale(0.97);
    box-shadow: 0 6px 15px rgba(0,0,0,0.4), 0 0 0 4px #ffaa44;
  }
  
  .start-title {
    font-size: 2rem;
    color: #ffdd99;
    margin-bottom: 30px;
    text-shadow: 3px 3px 0 #664422;
    background: rgba(0,0,0,0.5);
    padding: 15px 30px;
    border-radius: 60px;
    backdrop-filter: blur(8px);
  }
  
  .start-sub {
    margin-top: 40px;
    color: #ccaa77;
    font-size: 1rem;
    text-align: center;
  }

  #gameStatus {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    background: rgba(0,0,0,0.9);
    padding: 20px 40px;
    border-radius: 20px;
    border: 2px solid #ff6600;
    backdrop-filter: blur(8px);
  }

  #gameStatus h1 {
    color: #ffaa44;
    font-size: 2rem;
    margin-bottom: 15px;
  }

  #gameStatus p {
    color: white;
    font-size: 1.2rem;
    margin: 8px 0;
  }

  #gameStatus button {
    margin-top: 20px;
    padding: 12px 30px;
    font-size: 1.2rem;
    font-weight: bold;
    background: #ff6600;
    color: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    font-family: monospace;
    pointer-events: auto;
    transition: transform 0.1s;
  }
  
  #gameStatus button:active { transform: scale(0.95); }

  .instruction {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    padding: 8px 16px;
    border-radius: 40px;
    color: #ddd;
    font-size: 0.9rem;
    z-index: 10;
    pointer-events: none;
    white-space: nowrap;
  }

  @media (max-width: 600px) {
    #score, #distance { font-size: 1rem; padding: 5px 12px; }
    #gameStatus h1 { font-size: 1.4rem; }
    .instruction { font-size: 0.7rem; bottom: 10px; }
    #startBtn { padding: 16px 32px; font-size: 1.8rem; }
    .start-title { font-size: 1.3rem; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  <div id="ui">
    <div id="score">🏆 SCORE: 0</div>
    <div id="distance">🏃 DISTANCE: 0m</div>
  </div>
  
  <!-- START BUTTON SCREEN - "suru garne ta" -->
  <div id="startScreen">
    <div class="start-title">✂️ SCISSOR CHASE ✂️</div>
    <button id="startBtn">🏃 SURU GARNE TA 🏃</button>
    <div class="start-sub">👇 Tap / Click / Space to jump after start 👆<br>GS is chasing with scissors!</div>
  </div>
  
  <div id="gameStatus" class="hidden">
    <h1>✂️ GAME OVER ✂️</h1>
    <p>You were caught by the Scissor Demon!</p>
    <p>Final Score: <span id="finalScore">0</span></p>
    <button id="restartBtn">🔁 RUN AGAIN</button>
  </div>
  <div class="instruction">👇 TAP / CLICK / SPACE → JUMP over obstacles! 👆</div>
</div>

<script>
(function() {
  // ---------- CANVAS ----------
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let width = window.innerWidth;
  let height = window.innerHeight;
  
  function resizeCanvas() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  
  // ---------- GAME CONSTANTS - MASSIVELY INCREASED SIZES ----------
  const GROUND_Y_OFFSET = 100;
  let groundY = height - GROUND_Y_OFFSET;
  
  // 🔥 PLAYER AND GS - A LOT BIGGER (increased by 60%+)
  const PLAYER_WIDTH = 110;      // Was 75, now MUCH BIGGER
  const PLAYER_HEIGHT = 110;     // Was 75
  const PLAYER_X = 150;          // Adjusted for larger size
  
  const ENEMY_WIDTH = 115;       // Was 80, now MASSIVE
  const ENEMY_HEIGHT = 115;      // Was 80
  
  // Physics - HIGH JUMP for larger characters
  let playerY = groundY - PLAYER_HEIGHT;
  let playerVelocityY = 0;
  let isJumping = false;
  const GRAVITY = 0.85;
  const JUMP_POWER = -15.5;      // Stronger jump for bigger character
  
  // Game state
  let gameRunning = false;
  let score = 0;
  let distance = 0;
  let speed = 7.0;
  
  // Obstacles - also larger to match scale
  let obstacles = [];
  const OBSTACLE_WIDTH = 70;
  const OBSTACLE_HEIGHT = 70;
  let spawnCounter = 0;
  let dynamicSpawnRate = 58;
  
  // Enemy (GS) - chasing from behind
  let enemyX = -250;
  let enemyY = groundY - ENEMY_HEIGHT + 12;
  let chaseProgress = 0;
  
  // Background scroll
  let bgOffset = 0;
  
  // Image assets - player.png and gs.png
  const playerImg = new Image();
  const gsImg = new Image();
  let imagesLoaded = 0;
  let imagesReady = false;
  
  playerImg.src = "player.png";
  gsImg.src = "gs.png";
  
  playerImg.onload = () => { 
    imagesLoaded++; 
    if (imagesLoaded === 2) imagesReady = true; 
  };
  gsImg.onload = () => { 
    imagesLoaded++; 
    if (imagesLoaded === 2) imagesReady = true; 
  };
  
  // ---------- AUDIO - bg.mp3 (starts only after clicking start button) ----------
  let bgMusic = null;
  let audioCtx = null;
  let musicStarted = false;
  
  function initAudioOnStart() {
    if (bgMusic) return;
    bgMusic = new Audio();
    bgMusic.src = "bg.mp3";
    bgMusic.loop = true;
    bgMusic.volume = 0.45;
    bgMusic.preload = "auto";
  }
  
  function startMusic() {
    if (!bgMusic) {
      initAudioOnStart();
    }
    if (bgMusic && !musicStarted) {
      bgMusic.play().then(() => {
        musicStarted = true;
        console.log("Background music playing!");
      }).catch(e => {
        console.log("Audio play error, trying again on user tap");
        const retryPlay = () => {
          if (gameRunning && !musicStarted) {
            bgMusic.play().catch(() => {});
          }
        };
        document.body.addEventListener('click', retryPlay, { once: true });
        canvas.addEventListener('touchstart', retryPlay, { once: true });
      });
    }
  }
  
  function stopMusic() {
    if (bgMusic) {
      bgMusic.pause();
      bgMusic.currentTime = 0;
    }
    musicStarted = false;
  }
  
  // Jump sound effect
  function playJumpSound() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 920;
      gain.gain.value = 0.16;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.28);
      osc.stop(audioCtx.currentTime + 0.25);
    } catch(e) { console.log("jump sound error"); }
  }
  
  function playGameOverSound() {
    try {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = 320;
      gain.gain.value = 0.2;
      osc.start();
      gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.8);
      osc.stop(audioCtx.currentTime + 0.75);
      
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.frequency.value = 190;
      gain2.gain.value = 0.15;
      osc2.start(audioCtx.currentTime + 0.2);
      gain2.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1);
      osc2.stop(audioCtx.currentTime + 0.95);
    } catch(e) {}
  }
  
  // ---------- GAME MECHANICS ----------
  function jump() {
    if (!gameRunning) return;
    // Jump only when on ground
    if (playerY >= groundY - PLAYER_HEIGHT - 5 && !isJumping) {
      playerVelocityY = JUMP_POWER;
      isJumping = true;
      playJumpSound();
    }
  }
  
  function updatePhysics() {
    if (!gameRunning) return;
    playerVelocityY += GRAVITY;
    playerY += playerVelocityY;
    
    // Ground collision
    if (playerY >= groundY - PLAYER_HEIGHT) {
      playerY = groundY - PLAYER_HEIGHT;
      playerVelocityY = 0;
      isJumping = false;
    }
    
    // Ceiling collision
    if (playerY < 0) {
      playerY = 0;
      if (playerVelocityY < 0) playerVelocityY = 0;
    }
  }
  
  function spawnObstacle() {
    if (!gameRunning) return;
    if (obstacles.length > 0) {
      const last = obstacles[obstacles.length - 1];
      if (last.x > width - 280) return;
    }
    obstacles.push({
      x: width,
      y: groundY - OBSTACLE_HEIGHT,
      width: OBSTACLE_WIDTH,
      height: OBSTACLE_HEIGHT,
      passed: false
    });
  }
  
  function updateObstacles() {
    if (!gameRunning) return;
    
    for (let i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= speed;
    }
    
    obstacles = obstacles.filter(obs => obs.x + OBSTACLE_WIDTH > 0);
    
    for (let obs of obstacles) {
      if (!obs.passed && obs.x + OBSTACLE_WIDTH < PLAYER_X) {
        obs.passed = true;
        score += 10;
        updateUI();
      }
    }
  }
  
  function checkCollisions() {
    if (!gameRunning) return false;
    
    const playerRect = {
      x: PLAYER_X,
      y: playerY,
      w: PLAYER_WIDTH,
      h: PLAYER_HEIGHT
    };
    
    // Obstacle collision
    for (let obs of obstacles) {
      if (playerRect.x < obs.x + OBSTACLE_WIDTH &&
          playerRect.x + PLAYER_WIDTH > obs.x &&
          playerRect.y < obs.y + OBSTACLE_HEIGHT &&
          playerRect.y + PLAYER_HEIGHT > obs.y) {
        gameOver();
        return true;
      }
    }
    
    // Enemy chase logic - gets closer over time
    const targetX = PLAYER_X - 20;
    if (enemyX < targetX) {
      chaseProgress += 0.0032 + (score / 3500);
      if (chaseProgress > 1) chaseProgress = 1;
      enemyX = -250 + (targetX + 80) * chaseProgress;
    }
    
    // Enemy collision
    const enemyRect = {
      x: enemyX,
      y: enemyY,
      w: ENEMY_WIDTH,
      h: ENEMY_HEIGHT
    };
    
    if (playerRect.x < enemyRect.x + enemyRect.w &&
        playerRect.x + PLAYER_WIDTH > enemyRect.x &&
        playerRect.y < enemyRect.y + enemyRect.h &&
        playerRect.y + PLAYER_HEIGHT > enemyRect.y) {
      gameOver();
      return true;
    }
    
    return false;
  }
  
  function gameOver() {
    if (!gameRunning) return;
    gameRunning = false;
    
    stopMusic();
    playGameOverSound();
    
    document.getElementById('finalScore').textContent = Math.floor(score);
    document.getElementById('gameStatus').classList.remove('hidden');
  }
  
  function updateUI() {
    document.getElementById('score').textContent = `🏆 SCORE: ${Math.floor(score)}`;
    document.getElementById('distance').textContent = `🏃 DISTANCE: ${Math.floor(distance)}m`;
  }
  
  function updateDifficulty() {
    if (!gameRunning) return;
    speed = 7.0 + Math.floor(score / 400);
    if (speed > 15.5) speed = 15.5;
    
    dynamicSpawnRate = Math.max(32, 62 - Math.floor(speed / 1.3));
    
    distance += 0.32;
    updateUI();
  }
  
  // ---------- DRAWING with MASSIVE player and GS + ONE SCISSOR ----------
  function drawGround() {
    ctx.fillStyle = '#6B3E1A';
    ctx.fillRect(0, groundY - 10, width, 10);
    ctx.fillStyle = '#8B5A2B';
    ctx.fillRect(0, groundY - 16, width, 8);
    ctx.fillStyle = '#5A9E4E';
    ctx.fillRect(0, groundY - 26, width, 10);
    for(let i = 0; i < width; i += 45) {
      ctx.fillStyle = '#7CB518';
      ctx.beginPath();
      ctx.moveTo(i + (bgOffset % 45), groundY - 32);
      ctx.lineTo(i + 14 + (bgOffset % 45), groundY - 48);
      ctx.lineTo(i - 14 + (bgOffset % 45), groundY - 48);
      ctx.fill();
    }
  }
  
  function drawSky() {
    const grad = ctx.createLinearGradient(0, 0, 0, groundY - 60);
    grad.addColorStop(0, '#2C82C9');
    grad.addColorStop(1, '#6FB3E0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, groundY - 50);
    
    ctx.fillStyle = '#FFFFFFCC';
    for(let i = 0; i < 3; i++) {
      let cloudX = (bgOffset * 0.4 + i * 320) % (width + 250) - 120;
      ctx.beginPath();
      ctx.ellipse(cloudX, 55 + i*45, 65, 42, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX + 55, 45 + i*38, 58, 40, 0, 0, Math.PI*2);
      ctx.ellipse(cloudX - 45, 48 + i*42, 58, 40, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawObstacles() {
    for (let obs of obstacles) {
      ctx.fillStyle = '#8B5A2B';
      ctx.shadowBlur = 4;
      ctx.fillRect(obs.x, obs.y, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
      ctx.fillStyle = '#C97E3A';
      ctx.fillRect(obs.x + 8, obs.y + 12, OBSTACLE_WIDTH - 16, 10);
      ctx.fillStyle = '#5A3E1A';
      for(let s = 0; s < 3; s++) {
        ctx.beginPath();
        ctx.moveTo(obs.x + 16 + s*20, obs.y - 9);
        ctx.lineTo(obs.x + 25 + s*20, obs.y + 5);
        ctx.lineTo(obs.x + 7 + s*20, obs.y + 5);
        ctx.fill();
      }
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(obs.x + 18, obs.y + 42, 12, 16);
      ctx.fillRect(obs.x + 40, obs.y + 42, 12, 16);
    }
    ctx.shadowBlur = 0;
  }
  
  function drawPlayer() {
    const x = PLAYER_X;
    const y = playerY;
    
    if (imagesReady && playerImg.complete && playerImg.naturalWidth > 0) {
      ctx.drawImage(playerImg, x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
    } else {
      // Fallback GIANT Mario-style runner
      ctx.fillStyle = '#FF5555';
      ctx.fillRect(x, y, PLAYER_WIDTH, PLAYER_HEIGHT);
      ctx.fillStyle = '#FFDD99';
      ctx.fillRect(x + 20, y + 18, 22, 22);
      ctx.fillRect(x + 68, y + 18, 22, 22);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 26, y + 26, 10, 10);
      ctx.fillRect(x + 74, y + 26, 10, 10);
      ctx.fillStyle = '#8B4513';
      ctx.fillRect(x + 18, y + 70, 30, 14);
      ctx.fillRect(x + 62, y + 70, 30, 14);
      // Hat
      ctx.fillStyle = '#E52525';
      ctx.fillRect(x + 12, y - 12, PLAYER_WIDTH - 24, 18);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x + 30, y - 6, 12, 8);
    }
    
    // Jump dust effect - larger
    if (isJumping && playerVelocityY < -7) {
      ctx.fillStyle = '#DDDDDDAA';
      ctx.beginPath();
      ctx.ellipse(x + PLAYER_WIDTH/2, y + PLAYER_HEIGHT - 12, 22, 10, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
  
  function drawEnemy() {
    const x = enemyX;
    const y = enemyY;
    if (x > width + 120) return;
    
    if (imagesReady && gsImg.complete && gsImg.naturalWidth > 0) {
      ctx.drawImage(gsImg, x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
    } else {
      // Fallback GIANT enemy
      ctx.fillStyle = '#3A2A2A';
      ctx.fillRect(x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
      ctx.fillStyle = '#FF6666';
      ctx.fillRect(x + 24, y + 26, 22, 22);
      ctx.fillRect(x + 70, y + 26, 22, 22);
      ctx.fillStyle = '#000';
      ctx.fillRect(x + 30, y + 34, 10, 10);
      ctx.fillRect(x + 76, y + 34, 10, 10);
      // Evil eyebrows
      ctx.fillStyle = '#222';
      ctx.fillRect(x + 18, y + 20, 28, 8);
      ctx.fillRect(x + 70, y + 20, 28, 8);
    }
    
    // GS holding ONLY ONE SCISSOR - LARGE AND PROMINENT
    ctx.font = `bold 68px "Segoe UI Emoji", "Apple Color Emoji"`;
    ctx.shadowBlur = 5;
    ctx.fillStyle = '#E8E8E8';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 40, y + ENEMY_HEIGHT - 22);
    ctx.fillStyle = '#FFCC88';
    ctx.fillText("✂️", x + ENEMY_WIDTH - 42, y + ENEMY_HEIGHT - 24);
    // Scissor handle detail
    ctx.font = `38px monospace`;
    ctx.fillStyle = '#AAAAAA';
    ctx.fillText("⚔️", x + 18, y + 82);
    ctx.shadowBlur = 0;
    
    // Danger indicator - more intense
    const dangerPercent = Math.min(100, Math.floor((enemyX + 250) / (PLAYER_X + 120) * 100));
    if (dangerPercent > 60 && gameRunning) {
      ctx.fillStyle = `rgba(255, 70, 70, ${0.5 + (dangerPercent - 60) / 80})`;
      ctx.fillRect(x - 12, y - 12, ENEMY_WIDTH + 24, 10);
      // Red glow around GS
      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ff0000';
      ctx.drawImage(gsImg, x, y, ENEMY_WIDTH, ENEMY_HEIGHT);
      ctx.shadowBlur = 0;
    }
  }
  
  function drawUItext() {
    ctx.font = 'bold 20px "Courier New", monospace';
    ctx.fillStyle = '#FFFFAA';
    ctx.shadowBlur = 0;
    ctx.fillText(`⚡ SPEED: ${Math.floor(speed)}`, width - 140, 50);
    if (gameRunning) {
      const danger = Math.min(99, Math.floor((enemyX + 250) / (PLAYER_X + 130) * 100));
      ctx.fillStyle = danger > 70 ? '#FF6666' : '#FFAA66';
      ctx.fillText(`✂️ DANGER: ${danger}%`, width - 148, 90);
    }
  }
  
  function draw() {
    ctx.clearRect(0, 0, width, height);
    drawSky();
    drawGround();
    drawObstacles();
    drawPlayer();
    drawEnemy();
    drawUItext();
    
    // Jump hint
    if (gameRunning && !isJumping && playerY >= groundY - PLAYER_HEIGHT - 3) {
      ctx.font = 'bold 18px monospace';
      ctx.fillStyle = '#FFFFFFDD';
      ctx.shadowBlur = 2;
      ctx.fillText("↑ JUMP ↑", PLAYER_X + 40, playerY - 18);
    }
  }
  
  // ---------- GAME LOOP ----------
  function updateGame() {
    if (!gameRunning) return;
    
    updatePhysics();
    updateObstacles();
    updateDifficulty();
    if (checkCollisions()) return;
    
    spawnCounter++;
    if (spawnCounter >= dynamicSpawnRate) {
      spawnObstacle();
      spawnCounter = 0;
    }
    
    bgOffset += speed * 0.52;
    score += 0.3;
    updateUI();
  }
  
  function animate() {
    updateGame();
    draw();
    requestAnimationFrame(animate);
  }
  
  // ---------- START GAME (triggered by "suru garne ta" button) ----------
  function startGame() {
    // Hide start screen
    document.getElementById('startScreen').classList.add('hidden');
    
    // Reset all game variables
    gameRunning = true;
    score = 0;
    distance = 0;
    speed = 7.0;
    obstacles = [];
    spawnCounter = 0;
    playerY = groundY - PLAYER_HEIGHT;
    playerVelocityY = 0;
    isJumping = false;
    chaseProgress = 0;
    enemyX = -250;
    enemyY = groundY - ENEMY_HEIGHT + 12;
    dynamicSpawnRate = 58;
    
    updateUI();
    
    // Initialize and start music
    initAudioOnStart();
    startMusic();
  }
  
  // ---------- RESTART GAME ----------
  function restartGame() {
    gameRunning = true;
    score = 0;
    distance = 0;
    speed = 7.0;
    obstacles = [];
    spawnCounter = 0;
    playerY = groundY - PLAYER_HEIGHT;
    playerVelocityY = 0;
    isJumping = false;
    chaseProgress = 0;
    enemyX = -250;
    enemyY = groundY - ENEMY_HEIGHT + 12;
    dynamicSpawnRate = 58;
    
    document.getElementById('gameStatus').classList.add('hidden');
    updateUI();
    
    stopMusic();
    startMusic();
  }
  
  // ---------- EVENT HANDLERS ----------
  function handleJump(e) {
    e.preventDefault();
    jump();
  }
  
  canvas.addEventListener('touchstart', handleJump, { passive: false });
  canvas.addEventListener('mousedown', handleJump);
  
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      jump();
    }
    if (e.code === 'KeyR' && !gameRunning && !document.getElementById('startScreen').classList.contains('hidden') === false) {
      restartGame();
    }
  });
  
  // Start button event
  document.getElementById('startBtn').addEventListener('click', () => {
    startGame();
  });
  
  document.getElementById('restartBtn').addEventListener('click', () => {
    restartGame();
  });
  
  // Update ground on resize - adjust for larger characters
  window.addEventListener('resize', () => {
    groundY = height - GROUND_Y_OFFSET;
    if (gameRunning) {
      playerY = Math.min(playerY, groundY - PLAYER_HEIGHT);
      enemyY = groundY - ENEMY_HEIGHT + 12;
    }
  });
  
  // Initial ground setup
  setTimeout(() => {
    groundY = height - GROUND_Y_OFFSET;
    playerY = groundY - PLAYER_HEIGHT;
    enemyY = groundY - ENEMY_HEIGHT + 12;
    animate();
  }, 100);
})();
</script>
</body>
</html>
