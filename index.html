<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chase Game</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: radial-gradient(circle at center, #6ad2ff 0%, #005f99 100%);
    overflow: hidden;
  }

  #gameArea {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .character {
    position: absolute;
    width: 60px;
    height: 60px;
    background-size: cover;
    background-position: center;
    transition: transform 0.1s linear;
  }

  #player {
    background-image: url("player.png");
  }

  #gs {
    background-image: url("gs.png");
  }

  .obstacle {
    position: absolute;
    width: 100px;
    height: 100px;
    background: linear-gradient(45deg, #333, #777);
    box-shadow: 0 0 10px #0008;
    border-radius: 10px;
  }

  #message {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-family: Arial, sans-serif;
    font-size: 24px;
    text-shadow: 2px 2px 4px #000;
  }
</style>
</head>
<body>
<div id="gameArea">
  <div id="message">Use arrow keys to run!</div>
  <div id="player" class="character"></div>
  <div id="gs" class="character"></div>

  <!-- obstacles -->
  <div class="obstacle" style="left:300px; top:200px;"></div>
  <div class="obstacle" style="left:800px; top:400px;"></div>
  <div class="obstacle" style="left:500px; top:100px;"></div>
</div>

<script>
  const player = document.getElementById("player");
  const gs = document.getElementById("gs");
  const obstacles = Array.from(document.querySelectorAll(".obstacle"));
  const gameArea = document.getElementById("gameArea");
  const msg = document.getElementById("message");

  let playerPos = {x: 100, y: 100};
  let gsPos = {x: 800, y: 500};
  const speed = 5;
  const gsSpeed = 2.2;
  const keys = {};

  document.addEventListener("keydown", e => keys[e.key] = true);
  document.addEventListener("keyup", e => delete keys[e.key]);

  function movePlayer() {
    let newX = playerPos.x;
    let newY = playerPos.y;
    if (keys["ArrowUp"]) newY -= speed;
    if (keys["ArrowDown"]) newY += speed;
    if (keys["ArrowLeft"]) newX -= speed;
    if (keys["ArrowRight"]) newX += speed;

    if (!checkCollision(newX, newY)) {
      playerPos.x = Math.max(0, Math.min(window.innerWidth - 60, newX));
      playerPos.y = Math.max(0, Math.min(window.innerHeight - 60, newY));
    }
    player.style.transform = `translate(${playerPos.x}px, ${playerPos.y}px)`;
  }

  function moveGS() {
    const dx = playerPos.x - gsPos.x;
    const dy = playerPos.y - gsPos.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 0) {
      let newX = gsPos.x + (dx / dist) * gsSpeed;
      let newY = gsPos.y + (dy / dist) * gsSpeed;

      if (!checkCollision(newX, newY, gsPos)) {
        gsPos.x = newX;
        gsPos.y = newY;
      }
    }
    gs.style.transform = `translate(${gsPos.x}px, ${gsPos.y}px)`;
  }

  function checkCollision(x, y) {
    const rect = {x, y, w: 60, h: 60};
    for (let obs of obstacles) {
      const oRect = obs.getBoundingClientRect();
      if (
        rect.x < oRect.left - 0 &&
        rect.x + rect.w > oRect.left &&
        rect.y < oRect.top - 0 &&
        rect.y + rect.h > oRect.top
      ) {
        // collision
        return true;
      }
    }
    return false;
  }

  function checkCaught() {
    const dx = playerPos.x - gsPos.x;
    const dy = playerPos.y - gsPos.y;
    if (Math.abs(dx) < 45 && Math.abs(dy) < 45) {
      msg.textContent = "You got caught! Refresh to retry.";
      cancelAnimationFrame(loopId);
      return true;
    }
    return false;
  }

  function loop() {
    movePlayer();
    moveGS();
    if (!checkCaught()) loopId = requestAnimationFrame(loop);
  }

  let loopId = requestAnimationFrame(loop);
</script>
</body>
</html>
